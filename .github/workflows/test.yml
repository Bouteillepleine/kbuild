name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: "Do you want to create a release?"
        required: true
        type: boolean
        default: false

      op_model:
        description: "Select the OnePlus kernels to build"
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: android16-6.12

      ksu_options:
        description: "Enter KernelSU build JSON"
        required: true
        type: string
        default: '[{"type":"KSUN","hash":"dev"}]'

      optimize_level:
        description: "Compiler optimization level"
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2

      clean_build:
        description: "Clean build without ccache"
        type: boolean
        default: false

      android12-5_10_susfs_branch_or_commit:
        description: "Enter SUSFS branch or commit hash for android12-5.10"
        type: string
        default: ""

      android13-5_15_susfs_branch_or_commit:
        description: "Enter SUSFS branch or commit hash for android13-5.15"
        type: string
        default: ""

      android14-6_1_susfs_branch_or_commit:
        description: "Enter SUSFS branch or commit hash for android14-6.1"
        type: string
        default: ""

      android15-6_6_susfs_branch_or_commit:
        description: "Enter SUSFS branch or commit hash for android15-6.6"
        type: string
        default: ""

      android16-6_12_susfs_branch_or_commit:
        description: "Enter SUSFS branch or commit hash for android16-6.12"
        type: string
        default: ""

jobs:
  set-op-model:
    name: Generate build matrix
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}

    steps:
      - name: Checkout WildKernels source data
        uses: actions/checkout@v4
        with:
          repository: WildKernels/OnePlus_KernelSU_SUSFS
          ref: main
          path: source-data
          fetch-depth: 1
          sparse-checkout: |
            configs/
            manifests/
            kernel_patches/
          sparse-checkout-cone-mode: false

      - name: Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Matrix generation"

          input="${{ github.event.inputs.op_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'

          if ! ksu_options_normalized="$(echo "$ksu_options_raw" | jq -c '
            map(
              if .type then
                .type |= ascii_upcase
                | if .hash == null then
                    if .type == "KSUN" then
                      .hash = "next"
                    elif .type == "KSU" then
                      .hash = "main"
                    else
                      .
                    end
                  else
                    .
                  end
              else
                error("No type found")
              end
            )
          ' 2>&1)"; then
            echo "::error::ksu_options validation failed: $ksu_options_normalized"
            exit 1
          fi

          echo "Normalized KSU options:"
          echo "$ksu_options_normalized" | jq '.'

          case "$input" in
            OOS16)
              CONFIG_SEARCH_DIR="source-data/configs/oos16"
              ;;
            OOS15)
              CONFIG_SEARCH_DIR="source-data/configs/oos15"
              ;;
            OOS14)
              CONFIG_SEARCH_DIR="source-data/configs/oos14"
              ;;
            OOS15+16|OOS14+15|OOS14+15+16|android*-*.*)
              CONFIG_SEARCH_DIR="source-data/configs"
              ;;
            *)
              CONFIG_SEARCH_DIR="source-data/configs"
              ;;
          esac

          if [ ! -d "$CONFIG_SEARCH_DIR" ]; then
            echo "::error::Config directory not found: $CONFIG_SEARCH_DIR"
            echo ""
            echo "Available directories:"
            find source-data -maxdepth 5 -type d | sort || true
            exit 1
          fi

          mapfile -t all_json_files < <(find "$CONFIG_SEARCH_DIR" -name "*.json" -print | sort)

          if [ "${#all_json_files[@]}" -eq 0 ]; then
            echo "::error::No config JSON files found in $CONFIG_SEARCH_DIR"
            echo ""
            echo "Available config files:"
            find source-data/configs -maxdepth 6 -type f | sort || true
            exit 1
          fi

          echo "Found config files:"
          printf '  - %s\n' "${all_json_files[@]}"

          jq -s '.' "${all_json_files[@]}" > matrix.json

          jq_filter="."

          case "$input" in
            OOS14+15+16)
              jq_filter="."
              ;;
            OOS15+16)
              jq_filter='map(select(.os_version == "OOS15" or .os_version == "OOS16"))'
              ;;
            OOS14+15)
              jq_filter='map(select(.os_version == "OOS14" or .os_version == "OOS15"))'
              ;;
            OOS16)
              jq_filter='map(select(.os_version == "OOS16"))'
              ;;
            OOS15)
              jq_filter='map(select(.os_version == "OOS15"))'
              ;;
            OOS14)
              jq_filter='map(select(.os_version == "OOS14"))'
              ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\")) | map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "Android-kernel filter applied: $av-$kv"
              echo "Restricted to OOS15 and OOS16"
              ;;
            *)
              echo "::warning::Unknown input '$input'. Using empty filter."
              jq_filter="map(select(false))"
              ;;
          esac

          filtered="$(jq -c "$jq_filter" matrix.json)"
          count="$(jq 'length' <<< "$filtered")"

          if [ "$count" -eq 0 ]; then
            echo "::error::No config files found for input '$input'"
            echo ""
            echo "Available configurations:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi

          merged_matrix="$(jq -n \
            --argjson devices "$filtered" \
            --argjson ksu_list "$ksu_options_normalized" \
            '
              [
                $devices[] as $dev
                | $ksu_list[] as $ksu
                | ($dev + {
                    ksu_type: $ksu.type,
                    ksu_hash: $ksu.hash
                  })
              ]
            '
          )"

          final_count="$(jq 'length' <<< "$merged_matrix")"
          wrapped="$(jq -n --argjson items "$merged_matrix" '{ include: $items }')"

          echo "Found $final_count build target(s):"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' <<< "$merged_matrix"

          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      - name: Upload build matrix
        uses: actions/upload-artifact@v4
        with:
          name: build-matrix
          path: matrix.json
          retention-days: 1

      - name: Build plan summary
        shell: bash
        run: |
          set -euo pipefail

          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          ksu_options_normalized="$(echo "$ksu_options_raw" | jq -c '
            map(
              if .type then
                .type |= ascii_upcase
                | if .hash == null then
                    if .type == "KSUN" then
                      .hash = "next"
                    elif .type == "KSU" then
                      .hash = "main"
                    else
                      .
                    end
                  else
                    .
                  end
              else
                error("No type found")
              end
            )
          ')"

          {
            echo "## Build Plan"
            echo ""
            echo "**Target:** ${{ inputs.op_model }}"
            echo ""
            echo "**Devices:** ${{ steps.set-matrix.outputs.count }}"
            echo ""
            echo "**Configuration:**"
            echo "- KSU config: \`$ksu_options_normalized\`"
            echo "- Optimization: \`${{ inputs.optimize_level }}\`"
            echo "- Clean build: \`${{ inputs.clean_build }}\`"
            echo "- Create release: \`${{ inputs.make_release }}\`"
            echo ""
            echo "**SUSFS Configuration:**"
          } >> "$GITHUB_STEP_SUMMARY"

          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )

          for key in "android12-5.10" "android13-5.15" "android14-6.1" "android15-6.6" "android16-6.12"; do
            value="${susfs_inputs[$key]}"

            if [ -z "$value" ]; then
              echo "- $key: auto, \`gki-$key\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- $key: \`$value\`" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  build:
    name: build ${{ matrix.model }} ${{ matrix.os_version }} ${{ matrix.ksu_type }}
    needs: set-op-model
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}

    steps:
      - name: Emergency disk cleanup
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Disk usage before cleanup"
          df -h
          echo "::endgroup::"

          echo "::group::Removing unnecessary software"
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true

          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi

          echo "::endgroup::"

          echo "::group::Disk usage after cleanup"
          df -h
          echo "::endgroup::"

      - name: Download Apache Arrow free-space helper
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o util_free_space.sh https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout WildKernels config data
        uses: actions/checkout@v4
        with:
          repository: WildKernels/OnePlus_KernelSU_SUSFS
          ref: main
          path: source-data
          fetch-depth: 1
          sparse-checkout: |
            configs/
            manifests/
          sparse-checkout-cone-mode: false

      - name: Checkout WildKernels kernel patches
        uses: actions/checkout@v4
        with:
          repository: WildKernels/kernel_patches
          ref: main
          path: patch-data
          fetch-depth: 1

      - name: Prepare external source files
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Prepare external source files"

          rm -rf manifests kernel_patches

          if [ ! -d source-data/manifests ]; then
            echo "::error::source-data/manifests not found"
            echo "source-data tree:"
            find source-data -maxdepth 4 -type d | sort || true
            exit 1
          fi

          if [ ! -d patch-data ]; then
            echo "::error::patch-data not found"
            exit 1
          fi

          cp -a source-data/manifests ./manifests

          mkdir -p kernel_patches
          cp -a patch-data/. ./kernel_patches/
          rm -rf kernel_patches/.git

          echo "Prepared manifests:"
          find manifests -maxdepth 4 -type f | sort | head -n 100

          echo ""
          echo "Prepared kernel patches:"
          find kernel_patches -maxdepth 5 -type f | sort | head -n 150

          echo "::endgroup::"

      - name: Resolve SUSFS branch from workflow inputs
        id: susfs
        shell: bash
        if: ${{ matrix.susfs }}
        run: |
          set -euo pipefail

          key="${{ matrix.android_version }}-${{ matrix.kernel_version }}"

          case "$key" in
            "android12-5.10")
              susfs_branch="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
              ;;
            "android13-5.15")
              susfs_branch="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
              ;;
            "android14-6.1")
              susfs_branch="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
              ;;
            "android15-6.6")
              susfs_branch="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
              ;;
            "android16-6.12")
              susfs_branch="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
              ;;
            *)
              echo "::error::Unsupported kernel version: $key"
              exit 1
              ;;
          esac

          echo "susfs_branch=$susfs_branch" >> "$GITHUB_OUTPUT"

      - name: Export device config
        shell: bash
        run: |
          set -euo pipefail

          jq -n \
            --arg model "${{ matrix.model }}" \
            --arg soc "${{ matrix.soc }}" \
            --arg branch "${{ matrix.branch }}" \
            --arg manifest "${{ matrix.manifest }}" \
            --arg android_version "${{ matrix.android_version }}" \
            --arg kernel_version "${{ matrix.kernel_version }}" \
            --arg os_version "${{ matrix.os_version }}" \
            --argjson hmbird "${{ matrix.hmbird }}" \
            --argjson susfs "${{ matrix.susfs }}" \
            --argjson bbg "${{ matrix.bbg }}" \
            --argjson bbr "${{ matrix.bbr }}" \
            --argjson ttl "${{ matrix.ttl }}" \
            --argjson ip_set "${{ matrix.ip_set }}" \
            '
            {
              model: $model,
              soc: $soc,
              branch: $branch,
              manifest: $manifest,
              android_version: $android_version,
              kernel_version: $kernel_version,
              os_version: $os_version,
              hmbird: ($hmbird | tostring),
              susfs: ($susfs | tostring),
              bbg: ($bbg | tostring),
              bbr: ($bbr | tostring),
              ttl: ($ttl | tostring),
              ip_set: ($ip_set | tostring)
            }
            ' > /tmp/config.json

          jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"

          echo "Parsed config:"
          jq '.' /tmp/config.json

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Validate inputs"

          errors=()

          model="$OP_MODEL"
          soc="$OP_SOC"
          branch="$OP_BRANCH"
          manifest="$OP_MANIFEST"
          android_version="$OP_ANDROID_VERSION"
          kernel_version="$OP_KERNEL_VERSION"
          os_version="$OP_OS_VERSION"
          hmbird="$OP_HMBIRD"
          susfs="$OP_SUSFS"
          bbg="$OP_BBG"
          bbr="$OP_BBR"
          ttl="$OP_TTL"
          ip_set="$OP_IP_SET"
          optimize="${{ inputs.optimize_level }}"

          if [[ -z "$model" ]]; then
            errors+=("Input 'model' cannot be empty")
          elif [[ ! "$model" =~ ^OP ]]; then
            errors+=("Input 'model' does not start with OP. Got: '$model'")
          fi

          if [[ -z "$soc" ]]; then
            errors+=("Input 'soc' cannot be empty")
          elif [[ ! "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
            errors+=("Input 'soc' contains invalid characters. Got: '$soc'")
          fi

          if [[ -z "$branch" ]]; then
            errors+=("Input 'branch' cannot be empty")
          elif [[ ! "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            errors+=("Input 'branch' contains invalid characters. Got: '$branch'")
          fi

          if [[ -z "$manifest" ]]; then
            errors+=("Input 'manifest' cannot be empty")
          elif [[ "$manifest" == http*://* ]]; then
            if [[ ! "$manifest" =~ ^https:// ]]; then
              errors+=("Manifest URL must be HTTPS. Got: '$manifest'")
            fi
            if [[ ! "$manifest" =~ \.xml($|\?) ]]; then
              errors+=("Manifest URL should point to an XML file. Got: '$manifest'")
            fi
          else
            if [[ ! "$manifest" =~ \.xml$ ]]; then
              errors+=("Manifest filename must end with .xml. Got: '$manifest'")
            fi
            if [[ "$manifest" =~ [[:space:]] ]]; then
              errors+=("Manifest filename cannot contain spaces. Got: '$manifest'")
            fi
          fi

          if [[ -z "$android_version" ]]; then
            errors+=("Input 'android_version' cannot be empty")
          elif [[ ! "$android_version" =~ ^android[0-9]+$ ]]; then
            errors+=("Input 'android_version' must look like android15. Got: '$android_version'")
          fi

          if [[ -z "$kernel_version" ]]; then
            errors+=("Input 'kernel_version' cannot be empty")
          elif [[ ! "$kernel_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            errors+=("Input 'kernel_version' must look like 6.6. Got: '$kernel_version'")
          fi

          if [[ -z "$os_version" ]]; then
            errors+=("Input 'os_version' cannot be empty")
          elif [[ ! "$os_version" =~ ^OOS ]]; then
            errors+=("Input 'os_version' must start with OOS. Got: '$os_version'")
          fi

          for item in hmbird susfs bbg bbr ttl ip_set; do
            value="${!item}"
            if [[ "$value" != "true" && "$value" != "false" ]]; then
              errors+=("Input '$item' must be true or false. Got: '$value'")
            fi
          done

          case "$optimize" in
            O2|O3)
              ;;
            *)
              errors+=("optimize_level must be O2 or O3. Got: '$optimize'")
              ;;
          esac

          if [ "${#errors[@]}" -ne 0 ]; then
            echo "Found ${#errors[@]} validation error(s):" >&2
            for error in "${errors[@]}"; do
              echo "  - $error" >&2
            done
            echo "::error::Input validation failed"
            exit 1
          fi

          echo "Input validation passed"
          echo "::endgroup::"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Install dependencies"

          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc \
            dos2unix kmod libdw-dev elfutils zip wget

          sudo apt-get clean

          echo "::endgroup::"

      - name: Setup Rust toolchains
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Setup Rust toolchains"

          rustup toolchain install 1.82.0 --profile minimal
          rustup toolchain install nightly --profile minimal

          rustup default 1.82.0

          echo "Rust stable toolchain:"
          rustc --version
          cargo --version

          echo ""
          echo "Rust nightly toolchain:"
          rustc +nightly --version
          cargo +nightly --version

          echo "::endgroup::"

      - name: Install bindgen
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Install bindgen"

          cargo +nightly install bindgen-cli --version 0.69.5 --locked || \
          cargo +nightly install bindgen-cli --version 0.69.5

          echo "bindgen version:"
          bindgen --version

          echo "::endgroup::"

      - name: Setup base environment
        shell: bash
        run: |
          set -euo pipefail

          CONFIG="$OP_MODEL"
          echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

          REPO="/usr/local/bin/repo"

          if [ ! -x "$REPO" ]; then
            sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
            sudo chmod +x "$REPO"
          fi

          echo "REPO=$REPO" >> "$GITHUB_ENV"

      - name: Initialize and sync kernel source
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Initialize kernel source"

          mkdir -p "$CONFIG"
          cd "$CONFIG"

          if [[ "$OP_MANIFEST" == https://* ]]; then
            mkdir -p .repo/manifests
            curl --fail --show-error --location --proto '=https' "$OP_MANIFEST" -o .repo/manifests/temp_manifest.xml

            "$REPO" init \
              -u https://github.com/OnePlusOSS/kernel_manifest.git \
              -b "oneplus/sm8650" \
              -m temp_manifest.xml \
              --repo-rev=v2.16 \
              --depth=1 \
              --no-clone-bundle \
              --no-tags

          elif [[ "$OP_BRANCH" == wild/* ]]; then
            mkdir -p .repo/manifests

            MANIFEST_PATH="../manifests/$(echo "$OP_OS_VERSION" | tr '[:upper:]' '[:lower:]')/$OP_MANIFEST"

            if [ ! -f "$MANIFEST_PATH" ]; then
              echo "::error::Manifest file not found: $MANIFEST_PATH"
              echo "Available manifests:"
              find ../manifests -maxdepth 4 -type f | sort || true
              exit 1
            fi

            cp "$MANIFEST_PATH" .repo/manifests/temp_manifest.xml

            "$REPO" init \
              -u https://github.com/OnePlusOSS/kernel_manifest.git \
              -b "oneplus/sm8650" \
              -m temp_manifest.xml \
              --repo-rev=v2.16 \
              --depth=1 \
              --no-clone-bundle \
              --no-tags \
              -v
          else
            "$REPO" init \
              -u https://github.com/OnePlusOSS/kernel_manifest.git \
              -b "$OP_BRANCH" \
              -m "$OP_MANIFEST" \
              --repo-rev=v2.16 \
              --depth=1 \
              --no-clone-bundle \
              --no-tags \
              -v
          fi

          success=false

          for i in 1 2 3; do
            if "$REPO" sync \
              -c \
              --force-sync \
              -v \
              --no-clone-bundle \
              --no-tags \
              --optimized-fetch \
              -j"$(nproc --all)" \
              --fail-fast; then
              success=true
              break
            fi

            echo "repo sync attempt $i failed; retrying..."
            sleep 30
          done

          if [ "$success" != "true" ]; then
            echo "::error::repo sync failed after 3 attempts"
            exit 1
          fi

          echo "::endgroup::"

      - name: Get kernel version info
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Get kernel version"

          CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
          ARTIFACTS_DIR="$CONFIG_DIR/artifacts"

          mkdir -p "$ARTIFACTS_DIR"

          cd "$CONFIG_DIR/kernel_platform/common"

          CONFIG_FILES=("build.config.common" "build.config.constants")
          BRANCH_LINE=""

          for f in "${CONFIG_FILES[@]}"; do
            if [ -f "$f" ]; then
              line="$(grep '^[[:space:]]*BRANCH=' "$f" || true)"
              if [ -n "$line" ]; then
                BRANCH_LINE="$line"
                break
              fi
            fi
          done

          if [ -z "$BRANCH_LINE" ]; then
            echo "::error::No BRANCH= found in config files"
            exit 1
          fi

          BRANCH_VALUE="${BRANCH_LINE#*=}"
          ANDROID_VERSION="${BRANCH_VALUE%-*}"

          VERSION="$(grep '^VERSION *=' Makefile | awk '{print $3}')"
          PATCHLEVEL="$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')"
          SUBLEVEL="$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')"

          FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

          cd "$ARTIFACTS_DIR"

          echo "$ANDROID_VERSION-$FULL_VERSION" > "${OP_MODEL}_${OP_OS_VERSION}.txt"
          echo "$OP_OS_VERSION" >> "${OP_MODEL}_${OP_OS_VERSION}.txt"

          {
            echo "ANDROID_VER=$ANDROID_VERSION"
            echo "KERNEL_VER=$VERSION.$PATCHLEVEL"
            echo "TKERNEL_VER=$FULL_VERSION"
            echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION"
          } >> "$GITHUB_ENV"

          if [ "$OP_SUSFS" = "true" ]; then
            echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
          fi

          echo "::endgroup::"

      - name: Set build identity
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "BUILD_USER=OnePlus"
            echo "BUILD_HOST=ubuntu-build"
          } >> "$GITHUB_ENV"

      - name: Detect Clang and Rust
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Detect Clang and Rust"

          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"

          CLANG_FOUND=false
          RUSTC_FOUND=false

          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue

            latest="$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              CLANG_BIN="$latest/bin"
              CLANG_FOUND=true
              break
            fi
          done

          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/rust/linux-x86/" ] || continue

            latest="$(ls -d "$base/rust/linux-x86/1."* 2>/dev/null | sort -V | tail -n1 || true)"

            if [ -n "$latest" ] && [ -x "$latest/bin/rustc" ]; then
              RUSTC_BIN="$latest/bin"
              RUSTC_FOUND=true
              break
            fi
          done

          if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
            CLANG_BIN="$(dirname "$(command -v clang)")"
            CLANG_FOUND=true
          fi

          if ! $CLANG_FOUND; then
            echo "::error::No clang toolchain found"
            exit 1
          fi

          echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

          if [ "$RUSTC_FOUND" = "true" ]; then
            echo "RUSTC_BIN_PATH=$RUSTC_BIN" >> "$GITHUB_ENV"
            echo "RUSTC_VERSION=$("$RUSTC_BIN/rustc" --version | head -n1)" >> "$GITHUB_ENV"
          fi

          echo "CLANG_VERSION=$("$CLANG_BIN/clang" --version | head -n1)" >> "$GITHUB_ENV"

          echo "::endgroup::"

      - name: Derive Clang short version
        shell: bash
        run: |
          set -euo pipefail

          short="$("${CLANG_BIN_PATH}/clang" --version | sed -n '1s/.*clang-r\([0-9.]\+\).*/\1/p')"

          if [ -z "$short" ]; then
            short="$("${CLANG_BIN_PATH}/clang" --version | sha256sum | cut -c1-8)"
          fi

          echo "CLANG_VERSION_SHORT=$short" >> "$GITHUB_ENV"
          echo "CLANG_FULL_VERSION=$("${CLANG_BIN_PATH}/clang" --version | head -n1)" >> "$GITHUB_ENV"

      - name: Set cache environment
        shell: bash
        run: |
          set -euo pipefail

          CACHE_DIR="$HOME/.ccache"

          {
            echo "CCACHE_DIR=$CACHE_DIR"
            echo "CCACHE_MAXSIZE=1G"
          } >> "$GITHUB_ENV"

          mkdir -p "$CACHE_DIR"

      - name: Cache ccache
        if: ${{ inputs.clean_build != true }}
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ksu-v4-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-${{ env.CLANG_VERSION_SHORT }}
          restore-keys: |
            ccache-ksu-v4-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-${{ env.KERNEL_FULL_VER }}-
            ccache-ksu-v4-${{ env.OP_MODEL }}-${{ env.OP_OS_VERSION }}-

      - name: Configure ccache
        if: ${{ inputs.clean_build != true }}
        shell: bash
        run: |
          set -euo pipefail

          export CCACHE_DIR="$HOME/.ccache"
          export CCACHE_MAXSIZE="1G"

          ccache -M "$CCACHE_MAXSIZE"

          ccache -o compression=true
          ccache -o compression_level=3
          ccache -o direct_mode=true
          ccache -o hash_dir=false
          ccache -o file_clone=true || true
          ccache -o inode_cache=true || true
          ccache -o umask=002
          ccache -o sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale

          {
            echo "CCACHE_COMPILERCHECK=content"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_NOHASHDIR=true"
            echo "CCACHE_IGNOREOPTIONS=--sysroot*"
          } >> "$GITHUB_ENV"

          ccache -s || true

      - name: Clone AnyKernel3 and dependencies
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Clone dependencies"

          ANYKERNEL_BRANCH="gki-2.0"

          if [ "$OP_SUSFS" = "true" ]; then
            SUSFS_INPUT="${{ steps.susfs.outputs.susfs_branch }}"

            declare -A DEFAULT_SUSFS=(
              ["android12-5.10"]="gki-android12-5.10"
              ["android13-5.15"]="gki-android13-5.15"
              ["android14-6.1"]="gki-android14-6.1"
              ["android15-6.6"]="gki-android15-6.6"
              ["android16-6.12"]="gki-android16-6.12"
            )

            KERNEL_KEY="${ANDROID_VER}-${KERNEL_VER}"

            if [ -z "$SUSFS_INPUT" ] || [ "$SUSFS_INPUT" = "next" ]; then
              SUSFS_BRANCH="${DEFAULT_SUSFS[$KERNEL_KEY]:-gki-android15-6.6}"
            else
              SUSFS_BRANCH="$SUSFS_INPUT"
            fi

            echo "SUSFS_BRANCH=$SUSFS_BRANCH" >> "$GITHUB_ENV"
          fi

          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"

          if [ ! -d "$GITHUB_WORKSPACE/kernel_patches" ]; then
            echo "::error::kernel_patches directory missing. It should have been copied from patch-data."
            echo "Workspace tree:"
            find "$GITHUB_WORKSPACE" -maxdepth 2 -type d | sort || true
            exit 1
          fi


          if [ "$OP_SUSFS" = "true" ]; then
            git clone https://gitlab.com/simonpunk/susfs4ksu.git

            cd susfs4ksu

            git fetch --all --tags

            if git rev-parse --verify "origin/$SUSFS_BRANCH" >/dev/null 2>&1; then
              git checkout "$SUSFS_BRANCH"
            elif git rev-parse --verify "$SUSFS_BRANCH" >/dev/null 2>&1; then
              git checkout "$SUSFS_BRANCH"
            else
              echo "::error::SUSFS branch or commit '$SUSFS_BRANCH' not found"
              git branch -r | head -n 50
              exit 1
            fi

            SUSFS_COMMIT_SHA="$(git rev-parse HEAD)"
            SUSFS_BRANCH_NAME="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo detached)"

            {
              echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA"
              echo "SUSFS_BRANCH_NAME=$SUSFS_BRANCH_NAME"
            } >> "$GITHUB_ENV"
          fi

          echo "::endgroup::"

      - name: Clean up ABI protected exports
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform"

          rm -f common/android/abi_gki_protected_exports_* || true
          rm -f msm-kernel/android/abi_gki_protected_exports_* || true

          if [ -f common/modules.bzl ]; then
            sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
          fi

      - name: Add BBG
        if: ${{ env.OP_BBG == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform"

          if ! wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash; then
            echo "::warning::BBG setup script failed, continuing"
          fi

          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig

          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' common/security/Kconfig || true

      - name: Add KernelSU Next
        if: ${{ matrix.ksu_type == 'KSUN' }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform"

          if [ "${{ matrix.ksu_hash }}" = "" ]; then
            curl --fail --location --proto '=https' -LSs \
              "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          else
            curl --fail --location --proto '=https' -LSs \
              "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "${{ matrix.ksu_hash }}"
          fi

          git submodule update --init --recursive

          cd KernelSU-Next/kernel

          BASE_VERSION=10200
          KSU_VERSION="$(expr "$(/usr/bin/git rev-list --count HEAD)" + "$BASE_VERSION")"

          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile || true

          cd ..

          KSU_COMMIT_SHA="$(git rev-parse HEAD)"

          {
            echo "NEED_HOOKS=true"
            echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA"
            echo "KSUVER=$KSU_VERSION"
          } >> "$GITHUB_ENV"

      - name: Add KernelSU
        if: ${{ matrix.ksu_type == 'KSU' }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform"

          if [ "${{ matrix.ksu_hash }}" = "" ]; then
            curl --fail --location --proto '=https' -LSs \
              "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          else
            curl --fail --location --proto '=https' -LSs \
              "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ matrix.ksu_hash }}"
          fi

          git submodule update --init --recursive

          cd KernelSU/kernel

          BASE_VERSION=20000
          KSU_VERSION="$(expr "$(/usr/bin/git rev-list --count HEAD)" + "$BASE_VERSION")"

          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" Kbuild || true
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" Makefile || true

          cd ..

          KSU_COMMIT_SHA="$(git rev-parse HEAD)"

          {
            echo "NEED_HOOKS=false"
            echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA"
            echo "KSUVER=$KSU_VERSION"
          } >> "$GITHUB_ENV"

      - name: Apply SUSFS patches
        if: ${{ env.OP_SUSFS == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Apply SUSFS patches"

          cd "$CONFIG/kernel_platform"

          cp "../../susfs4ksu/kernel_patches/50_add_susfs_in_${SUSFS_KERNEL_BRANCH}.patch" ./common/
          cp ../../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

          susfs_version="$(grep '#define SUSFS_VERSION' ./common/include/linux/susfs.h | awk -F'"' '{print $2}')"

          echo "SUSVER=$susfs_version" >> "$GITHUB_ENV"

          version_lte() {
            [ "$(printf '%s\n' "$2" "$1" | sort -V | head -n1)" = "$1" ]
          }

          if version_lte "${susfs_version:1}" "1.5.12"; then
            echo "NEED_HOOKS=true" >> "$GITHUB_ENV"
          else
            echo "NEED_HOOKS=false" >> "$GITHUB_ENV"
          fi

          if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
            KSU_DIR="./KernelSU-Next"
          else
            KSU_DIR="./KernelSU"
          fi

          cd "$KSU_DIR"

          cp ../../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./

          patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch || true

          if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
            if [ -d "../../../kernel_patches/next/susfs_fix_patches/$susfs_version" ]; then
              for p in ../../../kernel_patches/next/susfs_fix_patches/"$susfs_version"/*.patch; do
                [ -f "$p" ] || continue
                patch -p1 --forward --fuzz=3 < "$p" || true
              done
            fi
          fi

          cd ../common

          patch -p1 --forward < "50_add_susfs_in_${SUSFS_KERNEL_BRANCH}.patch"

          echo "::endgroup::"    

      - name: Apply KSU hooks
        if: ${{ env.NEED_HOOKS == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform/common"

          patch -p1 < ../../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch

      - name: Add kernel config options
        shell: bash
        run: |
          set -euo pipefail

          cd "$CONFIG/kernel_platform"

          cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_KPROBES_HOOK=n
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=n
          CONFIG_ANDROID_BINDER_IPC_RUST=m
          CONFIG_LOCALVERSION="-OP-Wild"
          CONFIG_UAPI_HEADER_TEST=n
          EOF

          if [ "$OP_BBR" = "true" ]; then
            cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=n
          CONFIG_TCP_CONG_HTCP=n
          EOF
          fi

          if [ "$OP_TTL" = "true" ]; then
            cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          EOF
          fi

          if [ "$OP_IP_SET" = "true" ]; then
            cat >> common/arch/arm64/configs/gki_defconfig <<'EOF'
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          EOF
          fi

          echo "CUSTOM_LOCALVERSION=-OP-Wild" >> "$GITHUB_ENV"

      - name: Build kernel
        id: build_kernel
        shell: bash
        env:
          PYTHONWARNINGS: "ignore:invalid escape sequence"
        run: |
          set -euo pipefail

          echo "::group::Build kernel"

          KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          COMMON="$KERNEL_PATH/common"

          cd "$COMMON"

          if [ -d gki/aarch64/symbols ]; then
            cat \
              gki/aarch64/symbols/base \
              gki/aarch64/symbols/allwinner \
              gki/aarch64/symbols/amlogic \
              gki/aarch64/symbols/bcmstb \
              gki/aarch64/symbols/db845c \
              gki/aarch64/symbols/desktop \
              gki/aarch64/symbols/exynos \
              gki/aarch64/symbols/exynosauto \
              gki/aarch64/symbols/fips140 \
              gki/aarch64/symbols/galaxy \
              gki/aarch64/symbols/honor \
              gki/aarch64/symbols/imx \
              gki/aarch64/symbols/mtk \
              gki/aarch64/symbols/mtktv \
              gki/aarch64/symbols/oplus \
              gki/aarch64/symbols/pixel \
              gki/aarch64/symbols/qcom \
              gki/aarch64/symbols/rtkstb \
              gki/aarch64/symbols/rtktv \
              gki/aarch64/symbols/trusty \
              gki/aarch64/symbols/tuxera \
              gki/aarch64/symbols/type_visibility \
              gki/aarch64/symbols/unisoc \
              gki/aarch64/symbols/virtual_device \
              gki/aarch64/symbols/vivo \
              gki/aarch64/symbols/xiaomi \
              | ../build/abi/flatten_symbol_list > abi_symbollist.raw
          else
            touch abi_symbollist.raw
          fi

          touch protected_module_names_list

          KERNEL_BUILD_DATE="$(date -u)"

          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct 2>/dev/null || date +%s)"
          export KBUILD_BUILD_TIMESTAMP="$KERNEL_BUILD_DATE"
          export KBUILD_BUILD_USER="${BUILD_USER:-OnePlus}"
          export KBUILD_BUILD_HOST="${BUILD_HOST:-ubuntu-build}"
          export KBUILD_BUILD_VERSION=1

          WORKSPACE="${GITHUB_WORKSPACE}"

          MAP="-fdebug-prefix-map=${WORKSPACE}=."
          MPMAP="-fmacro-prefix-map=${WORKSPACE}=."
          FPMAP="-ffile-prefix-map=${WORKSPACE}=."

          export KCFLAGS="${KCFLAGS:-} $MAP $MPMAP $FPMAP -no-canonical-prefixes -fdiagnostics-color=never -Qunused-arguments -Wno-unused-command-line-argument"
          export KCPPFLAGS="${KCPPFLAGS:-} $MAP $MPMAP $FPMAP"

          export CC="ccache clang"
          export CXX="ccache clang++"
          export HOSTCC="ccache clang"
          export HOSTCXX="ccache clang++"

          export LLVM=1
          export LLVM_IAS=1
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android13-

          export LD=ld.lld
          export HOSTLD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          BASE_PATH="/usr/lib/ccache:${CLANG_BIN_PATH}:${KERNEL_PATH}/prebuilts/kernel-build-tools/linux-x86/bin/"

          if [ -n "${RUSTC_BIN_PATH:-}" ]; then
            export PATH="${BASE_PATH}:${RUSTC_BIN_PATH}:${PATH}"
            export RUSTC="$RUSTC_BIN_PATH/rustc"
          else
            export PATH="${BASE_PATH}:${PATH}"
          fi

          if [ "${{ inputs.clean_build }}" = "true" ]; then
            export CCACHE_DISABLE=1
          fi

          OUT=out
          mkdir -p "$OUT"

          make LTO=none O="$OUT" gki_defconfig

          scripts/config --file "$OUT/.config" --set-str LOCALVERSION "${CUSTOM_LOCALVERSION:-"-OP-Wild"}"
          scripts/config --file "$OUT/.config" -e LOCALVERSION_AUTO || true
          scripts/config --file "$OUT/.config" -e MODULE_SCMVERSION || true

          if [ "${{ inputs.optimize_level }}" = "O3" ]; then
            scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE || true
            scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE_O3 || true
            KCFLAGS_EXTRA="-O3"
          else
            scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE || true
            scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE_O3 || true
            KCFLAGS_EXTRA="-O2"
          fi

          scripts/config --file "$OUT/.config" -e TRIM_UNUSED_KSYMS || true
          scripts/config --file "$OUT/.config" --set-str UNUSED_KSYMS_WHITELIST "abi_symbollist.raw" || true

          scripts/config --file "$OUT/.config" -e MODULE_SIG_PROTECT || true
          scripts/config --file "$OUT/.config" --set-str MODULE_SIG_PROTECT_LIST "protected_module_names_list" || true

          scripts/config --file "$OUT/.config" -d LTO || true
          scripts/config --file "$OUT/.config" -d LTO_CLANG || true
          scripts/config --file "$OUT/.config" -d LTO_CLANG_FULL || true
          scripts/config --file "$OUT/.config" -d LTO_CLANG_THIN || true

          make LTO=none O="$OUT" olddefconfig

          KCFLAGS="$KCFLAGS -Wno-error -pipe -fno-stack-protector ${KCFLAGS_EXTRA}"

          BUILD_START="$(date +%s)"

          set -o pipefail
          make LTO=none -j"$(nproc --all)" O="$OUT" KCFLAGS="$KCFLAGS" KCPPFLAGS="$KCPPFLAGS" 2>&1 | tee build.log

          BUILD_END="$(date +%s)"
          BUILD_TIME="$((BUILD_END - BUILD_START))"

          {
            echo "BUILD_START=$BUILD_START"
            echo "BUILD_END=$BUILD_END"
            echo "BUILD_TIME=$BUILD_TIME"
          } >> "$GITHUB_ENV"

          IMG="$OUT/arch/arm64/boot/Image"

          if [ ! -f "$IMG" ]; then
            echo "::error::Kernel Image missing"
            tail -n 100 build.log || true
            exit 1
          fi

          echo "::endgroup::"

      - name: ccache post-build statistics
        id: ccache_stats
        if: ${{ always() && inputs.clean_build != true }}
        shell: bash
        run: |
          set -euo pipefail

          export CCACHE_DIR="${{ env.CCACHE_DIR }}"

          ccache -s || true

          STATS="$(ccache -s || true)"

          CACHEABLE="$(echo "$STATS" | awk '/Cacheable calls:/ {print $3}' | tr -d ',' | head -n1)"
          HITS="$(echo "$STATS" | awk '/^[[:space:]]*Hits:/ {print $2}' | tr -d ',' | head -n1)"
          DIRECT="$(echo "$STATS" | awk '/Direct:/ {print $2}' | tr -d ',' | head -n1)"

          CACHEABLE="${CACHEABLE:-0}"
          HITS="${HITS:-0}"
          DIRECT="${DIRECT:-0}"

          if [ "$CACHEABLE" -gt 0 ]; then
            HIT_RATE="$(awk -v h="$HITS" -v c="$CACHEABLE" 'BEGIN{printf "%.1f", (h/c)*100}')"
            DIRECT_RATE="$(awk -v d="$DIRECT" -v c="$CACHEABLE" 'BEGIN{printf "%.1f", (d/c)*100}')"
          else
            HIT_RATE="0.0"
            DIRECT_RATE="0.0"
          fi

          echo "hit_rate=${HIT_RATE}%" >> "$GITHUB_OUTPUT"
          echo "direct_rate=${DIRECT_RATE}%" >> "$GITHUB_OUTPUT"

      - name: Collect build stats and validate Image
        id: collect_stats
        shell: bash
        run: |
          set -euo pipefail

          KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          COMMON="$KERNEL_PATH/common"
          OUT="$COMMON/out"
          IMG="$OUT/arch/arm64/boot/Image"

          if [ -f "$KERNEL_PATH/out/$OP_ANDROID_VERSION-$OP_KERNEL_VERSION/dist/Image" ]; then
            IMG="$KERNEL_PATH/out/$OP_ANDROID_VERSION-$OP_KERNEL_VERSION/dist/Image"
          elif [ -f "$KERNEL_PATH/bazel-bin/common/kernel_aarch64/Image" ]; then
            IMG="$KERNEL_PATH/bazel-bin/common/kernel_aarch64/Image"
          fi

          if [ ! -f "$IMG" ]; then
            echo "::error::Kernel Image not found at: $IMG"
            exit 1
          fi

          if ! file "$IMG" | grep -qi 'ARM64'; then
            echo "::error::Image is not ARM64 format"
            file "$IMG"
            exit 1
          fi

          IMG_SIZE="$(stat -c%s "$IMG")"
          MIN_SIZE=6102400

          if [ "$IMG_SIZE" -lt "$MIN_SIZE" ]; then
            echo "::error::Image size too small: $(numfmt --to=iec-i --suffix=B "$IMG_SIZE")"
            exit 1
          fi

          WARNINGS_COUNT="0"

          if [ -f "$COMMON/build.log" ]; then
            WARNINGS_COUNT="$(grep -ciE '\bwarning:' "$COMMON/build.log" || true)"
          fi

          IMG_SHA256="$(sha256sum "$IMG" | awk '{print $1}')"
          BUILD_TIME="${BUILD_TIME:-0}"

          KERNEL_UNAME="$(strings "$IMG" | grep -E 'Linux version.*#' | tail -n1 || true)"

          {
            echo "warnings_count=$WARNINGS_COUNT"
            echo "image_sha256=$IMG_SHA256"
            echo "build_time=$BUILD_TIME"
          } >> "$GITHUB_OUTPUT"

          {
            echo "KERNEL_UNAME=$KERNEL_UNAME"
            echo "IMAGE_PATH=$IMG"
          } >> "$GITHUB_ENV"

      - name: Create kernel ZIP
        id: create_zip
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Create kernel ZIP"

          CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
          IMAGE_PATH="${IMAGE_PATH:-$CONFIG_DIR/kernel_platform/common/out/arch/arm64/boot/Image}"

          if [ ! -f "$IMAGE_PATH" ]; then
            echo "::error::Built Image not found at: $IMAGE_PATH"
            exit 1
          fi

          cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/AnyKernel3/Image"

          cd "$GITHUB_WORKSPACE/AnyKernel3"

          if [ "$OP_SUSFS" = "true" ]; then
            ZIP_NAME="AK3_${OP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${{ matrix.ksu_type }}_${KSUVER:-unknown}_${SUSVER:-unknown}.zip"
          else
            ZIP_NAME="AK3_${OP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${{ matrix.ksu_type }}_${KSUVER:-unknown}.zip"
          fi

          ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          zip -r9 "$ZIP_NAME" ./* \
            -x "*.git*" \
            -x "$ZIP_NAME" \
            -x "README.md"

          mv "$ZIP_NAME" "$ARTIFACTS_DIR/"

          find "$ARTIFACTS_DIR" -maxdepth 1 -type f ! -name "$ZIP_NAME" ! -name "${OP_MODEL}_${OP_OS_VERSION}.txt" -delete

          ZIP_SHA256="$(sha256sum "$ARTIFACTS_DIR/$ZIP_NAME" | awk '{print $1}')"

          {
            echo "zip_name=$ZIP_NAME"
            echo "zip_sha256=$ZIP_SHA256"
          } >> "$GITHUB_OUTPUT"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          echo "::endgroup::"

      - name: Final build summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Kernel Build Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Model | ${OP_MODEL:-unknown} |"
            echo "| OS Version | ${OP_OS_VERSION:-unknown} |"
            echo "| Android | ${ANDROID_VER:-unknown} |"
            echo "| Kernel Base | ${KERNEL_VER:-unknown} |"
            echo "| Kernel Full | ${KERNEL_FULL_VER:-unknown} |"
            echo "| Kernel Uname | \`${KERNEL_UNAME:-unknown}\` |"
            echo "| KSU Type | ${{ matrix.ksu_type }} |"
            echo "| KSU Version | ${KSUVER:-unknown} |"
            echo "| Optimization | ${{ inputs.optimize_level }} |"
            echo "| Clean Build | ${{ inputs.clean_build }} |"
            echo "| Build Time | ${{ steps.collect_stats.outputs.build_time }}s |"
            echo "| Warnings | ${{ steps.collect_stats.outputs.warnings_count }} |"
            echo "| Image SHA256 | \`${{ steps.collect_stats.outputs.image_sha256 }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${OP_SUSFS:-false}" = "true" ]; then
            {
              echo "| SUSFS Version | ${SUSVER:-unknown} |"
              echo "| SUSFS Branch | ${SUSFS_BRANCH_NAME:-unknown} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ inputs.clean_build }}" != "true" ]; then
            {
              echo "| ccache Hit Rate | ${{ steps.ccache_stats.outputs.hit_rate }} |"
              echo "| ccache Direct Rate | ${{ steps.ccache_stats.outputs.direct_rate }} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: success() && steps.create_zip.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.ksu_type }}-${{ env.CONFIG }}_${{ env.OP_OS_VERSION }}
          path: ${{ env.CONFIG }}/artifacts/
          compression-level: 0
          retention-days: 20

      - name: Final cleanup and space report
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Cleanup"

          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/kernel/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/.repo" || true
          sudo rm -rf /tmp/* || true

          if command -v ccache >/dev/null 2>&1; then
            ccache -s || true
          fi

          df -h /

          echo "::endgroup::"

  trigger-release:
    name: Create release
    needs:
      - build
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: "OnePlus Kernels With KernelSU / KernelSU Next & SUSFS"
      SUSFS_BASE_VERSION: "v1.5.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and create tag
        shell: bash
        run: |
          set -euo pipefail

          BASE_TAG="$SUSFS_BASE_VERSION-r0"

          LATEST_TAG="$(gh api "repos/$REPO_OWNER/$REPO_NAME/tags" --jq '.[0].name' 2>/dev/null || true)"

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            LATEST_TAG="$BASE_TAG"
          else
            LATEST_TAG="$(printf "%s\n%s\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)"
          fi

          NEW_TAG="$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')"

          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          ZIP_COUNT="$(find ./downloaded-artifacts -name "*.zip" | wc -l | tr -d ' ')"

          SUSFS_A12="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
          SUSFS_A13="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
          SUSFS_A14="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
          SUSFS_A15="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
          SUSFS_A16="${{ inputs.android16-6_12_susfs_branch_or_commit }}"

          [ -z "$SUSFS_A12" ] && SUSFS_A12="gki-android12-5.10 auto"
          [ -z "$SUSFS_A13" ] && SUSFS_A13="gki-android13-5.15 auto"
          [ -z "$SUSFS_A14" ] && SUSFS_A14="gki-android14-6.1 auto"
          [ -z "$SUSFS_A15" ] && SUSFS_A15="gki-android15-6.6 auto"
          [ -z "$SUSFS_A16" ] && SUSFS_A16="gki-android16-6.12 auto"

          cat > release_notes.md <<EOF
          # OnePlus Kernels with KernelSU / KernelSU Next & SUSFS

          **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
          **Build ID:** \`${{ github.run_id }}\`  
          **Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---

          ## Build Configuration

          | Component | Value |
          |----------|-------|
          | Target | \`${{ inputs.op_model }}\` |
          | Optimization | \`${{ inputs.optimize_level }}\` |
          | Clean Build | \`${{ inputs.clean_build }}\` |
          | ZIP Count | \`$ZIP_COUNT\` |

          ---

          ## SUSFS Branch Mapping

          | Kernel Version | SUSFS Branch/Commit |
          |----------------|---------------------|
          | android12-5.10 | \`$SUSFS_A12\` |
          | android13-5.15 | \`$SUSFS_A13\` |
          | android14-6.1 | \`$SUSFS_A14\` |
          | android15-6.6 | \`$SUSFS_A15\` |
          | android16-6.12 | \`$SUSFS_A16\` |

          ---

          ## Installation

          1. Download the ZIP matching your device.
          2. Flash with Kernel Flasher or another compatible AnyKernel3 flasher.
          3. Reboot.
          4. Install the matching KernelSU / KernelSU Next manager.
          5. Install the SUSFS module if required.

          ---

          Built automatically with GitHub Actions.
          EOF

          echo "Release notes generated:"
          cat release_notes.md

      - name: Create GitHub release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --prerelease

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail

          shopt -s globstar nullglob

          for file in ./downloaded-artifacts/**/*.zip; do
            echo "Uploading $file"
            gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
          done

      - name: Release summary
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Release Created"
            echo ""
            echo "**Tag:** \`${{ env.NEW_TAG }}\`"
            echo ""
            echo "### Assets"
          } >> "$GITHUB_STEP_SUMMARY"

          shopt -s globstar nullglob

          for zip in ./downloaded-artifacts/**/*.zip; do
            name="$(basename "$zip")"
            size="$(stat -c%s "$zip")"
            size_mb="$(echo "scale=2; $size / 1024 / 1024" | bc)"
            echo "- \`$name\` (${size_mb} MB)" >> "$GITHUB_STEP_SUMMARY"
          done
