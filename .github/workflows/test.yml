name: Build OnePlus Kernels

on:
  workflow_dispatch:
    inputs:
      FILE:
        type: choice
        description: "Primary kernel configuration to build"
        required: true
        default: oneplus_15
        options:          
          - oneplus_10r_v
          - oneplus_nord_3_v          
          - oneplus_ace_race_v
          - oneplus_10_pro_b
          - oneplus_10t_v
          - oneplus_11r_b
          - oneplus_ace2_b
          - oneplus_pad_lite_b
          - oneplus_pad_lite_Canary_b
          - oneplus_pad_mt6983_b
          - oneplus_ace_2v_b
          - oneplus_ace_pro_v
          - oneplus_11_b
          - oneplus_12r_b
          - oneplus_ace2_pro_b
          - oneplus_ace3_b
          - oneplus_open_b
          - oneplus_nord_ce4_b
          - oneplus_12_b
          - oneplus_pad_go_2_b
          - oneplus_nord_ce4_lite_5g_b
          - oneplus_nord_ce6_lite_b
          - oneplus_turbo_6v
          - oneplus_nord_4_b
          - oneplus_ace_3v_b
          - oneplus_pad_mt6897_b
          - oneplus_13r_b
          - oneplus_ace3_pro_b
          - oneplus_ace5_b
          - oneplus_pad_pro_b
          - oneplus_pad2_b
          - oneplus_nord_ce5_b
          - oneplus_nord_5_b
          - oneplus_ace5_pro_b
          - oneplus_13_b
          - oneplus_13t_b
          - oneplus_13s_b
          - oneplus_pad_2_pro_b
          - oneplus_pad_3_b
          - oneplus_ace5_race_b
          - oneplus_ace5_ultra_b
          - oneplus_pad2_mt6991_b
          - oneplus_ace_6
          - oneplus_turbo_6
          - oneplus_nord_6
          - oneplus_ace_6t
          - oneplus_15r
          - oneplus_15
          - oneplus_15t
          - oneplus_pad_3_pro
          - oneplus_pad_4
          - oneplus_ace6_ultra
      
      EXTRA_FILES:
        type: string
        description: "Optional extra kernel configs. Separate entries with commas, spaces, semicolons, or new lines."
        required: false
        default: ""

      KSU_TYPE:
        type: choice
        description: "KernelSU implementation label used in the AK3 zip name"
        required: true
        default: SukiSUUltra
        options:
          - SukiSUUltra

      SUSFS_META:
        type: string
        description: "SUSFS rollback target. Enter a commit hash, rollback count, or -1 to disable SUSFS."
        required: false
        default: ""

      BUILD_TIME:
        type: string
        description: "Custom kernel build time. Enter F to use the current UTC time, or -1 to disable."
        required: false
        default: "Fri Dec 12 11:37:03 UTC 2025"

      KSU_META:
        type: string
        description: "Format: branch/custom-version/commit-hash. Custom version and commit hash may be left empty."
        required: false
        default: "builtin/⚡Ultra⚡/"

      SUFFIX:
        type: string
        description: "Custom kernel suffix. Leave empty to use a random suffix, or enter -1 to disable."
        required: false
        default: ""

      LSM_BBG:
        type: boolean
        description: "Enable critical partition write protection module, BBG"
        required: true
        default: false

      NETFILTER:
        type: boolean
        description: "Enable NETFILTER network feature extensions"
        required: true
        default: true

      CCM:
        type: boolean
        description: "Enable network congestion control features, BBR and ECN"
        required: true
        default: true

      UNICODE_BYPASS:
        type: boolean
        description: "Apply the Unicode invisible code point read-bypass vulnerability patch"
        required: true
        default: false

      SUSFS_DEV:
        type: boolean
        description: "Use the SUSFS development branch"
        required: true
        default: false

      BUILD_NOCACHE:
        type: boolean
        description: "Disable cache for this build"
        required: true
        default: false

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.files.outputs.files }}

    steps:
      - name: Convert selected files to matrix JSON
        id: files
        shell: bash
        run: |
          set -euo pipefail
          PRIMARY_FILE="${{ github.event.inputs.FILE }}"
          EXTRA_FILES="${{ github.event.inputs.EXTRA_FILES }}"
          FILES_JSON="$(
            {
              printf '%s\n' "$PRIMARY_FILE"
              printf '%s\n' "$EXTRA_FILES" \
                | tr ',;' '\n' \
                | tr ' ' '\n'
            } \
              | sed '/^[[:space:]]*$/d' \
              | sort -u \
              | jq -R . \
              | jq -cs .
          )"
          if [ "$FILES_JSON" = "[]" ]; then
            echo "No kernel configuration was provided."
            exit 1
          fi
          echo "Build matrix: $FILES_JSON"
          echo "files=$FILES_JSON" >> "$GITHUB_OUTPUT"
  build:
    name: Build

    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        FILE: ${{ fromJSON(needs.prepare.outputs.files) }}

    env:
      FILE: ${{ matrix.FILE }}
      CCACHE_COMPILERCHECK: "none"
      CCACHE_NOHASHDIR: "true"
      CCACHE_NOHARDLINK: "true"
      CCACHE_IS_KERNEL_COMPILING: "true"
      CCACHE_MAXSIZE: 10G

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Extract Manifest Info
        id: extract_info
        env:
          FILE: ${{ matrix.FILE }}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          if [[ "$FILE" =~ ^(.+)_([a-zA-Z])$ ]]; then
            FILE_CONF="${BASH_REMATCH[1]}"
          else
            FILE_CONF="$FILE"
          fi
          FILE_BASE=$(echo "$FILE_CONF" | sed -E 's/_bak//g; /_aosp/{s/_aosp//g;s/$/(AOSP)/;}; s/_([a-zA-Z0-9])/\U\1/g; s/^oneplus/OnePlus/; s/^realme/RealME/; s/^oppo/OPPO/')
          ZIP_MODEL=$(echo "$FILE_CONF" | sed -E 's/_bak//g; s/_aosp//g; s/^oneplus/OnePlus/; s/_/ /g; s/\b(.)/\U\1/g; s/ //g')
          mkdir -p ".repo/manifests_fallback"
          XML_PATH=".repo/manifests_fallback/${FILE}.xml"
          README_PATH=".repo/manifests_fallback/README.md"
          echo "Processing FILE=$FILE, CONF=$FILE_CONF, BASE=$FILE_BASE"
          echo "FILE_CONF=$FILE_CONF" >> "$GITHUB_ENV"
          echo "FILE_BASE=$FILE_BASE" >> "$GITHUB_ENV"
          echo "ZIP_MODEL=$ZIP_MODEL" >> "$GITHUB_ENV"
          declare -A REPOS
          REPOS["OnePlusOSS"]="OnePlusOSS|kernel_manifest"
          REPOS["Appendix"]="Numbersf|Kernel_Manifest_Appendix"
          FOUND_REPO=""
          FOUND_REPO_NAME=""
          FOUND_BRANCH=""
          check_repo() {
            local ENTRY=$1
            local OWNER=${ENTRY%%|*}
            local REPO_NAME=${ENTRY##*|}
            echo "Fetching branch list from ${OWNER}/${REPO_NAME}..."
            BRANCHES=$(git ls-remote --heads "https://github.com/${OWNER}/${REPO_NAME}.git" | sed 's|.*refs/heads/||')
            if [[ -z "$BRANCHES" ]]; then
              echo "Failed to fetch branches from ${OWNER}/${REPO_NAME}."
              return 1
            fi
            for BRANCH in $BRANCHES; do
              XML_URL="https://raw.githubusercontent.com/${OWNER}/${REPO_NAME}/${BRANCH}/${FILE}.xml"
              README_URL="https://raw.githubusercontent.com/${OWNER}/${REPO_NAME}/${BRANCH}/README.md"
              if curl -sf --head "$XML_URL" >/dev/null; then
                echo "Found ${FILE}.xml in ${OWNER}/${REPO_NAME} on branch ${BRANCH}"
                curl -s -o "$XML_PATH" "$XML_URL"
                curl -s -o "$README_PATH" "$README_URL" || true
                FOUND_REPO="$OWNER"
                FOUND_REPO_NAME="$REPO_NAME"
                FOUND_BRANCH="$BRANCH"
                return 0
              fi
            done
            return 1
          }
          if ! check_repo "${REPOS["OnePlusOSS"]}"; then
            check_repo "${REPOS["Appendix"]}"
          fi
          if [[ -z "$FOUND_REPO" || ! -s "$XML_PATH" ]]; then
            echo "Could not find ${FILE}.xml in any manifest repository"
            exit 8
          fi
          echo "MANIFEST_REPO=$FOUND_REPO" >> "$GITHUB_ENV"
          echo "MANIFEST_REPO_NAME=$FOUND_REPO_NAME" >> "$GITHUB_ENV"
          echo "MANIFEST_BRANCH=$FOUND_BRANCH" >> "$GITHUB_ENV"
          REVISION=$(grep -oP '<project[^>]+revision="\K[^"]+' "$XML_PATH" | head -n1 || true)
          CPU=$(echo "$REVISION" | sed -E 's#^(oneplus|realme|oppo)/([^_]+).*#\2#')
          ANDROID_VERSION=$(echo "$REVISION" | grep -oP '\d{1,2}\.\d{1,2}(\.\d{1,2})?')
          if [[ -n "$CPU" && -n "$ANDROID_VERSION" ]]; then
            echo "CPU=$CPU" >> "$GITHUB_ENV"
            echo "ANDROID_VERSION=$ANDROID_VERSION" >> "$GITHUB_ENV"
            echo "ANDROID_SHORT_VERSION=${ANDROID_VERSION%%.*}" >> "$GITHUB_ENV"
            echo "OP_OS_VERSION=Android${ANDROID_VERSION}" >> "$GITHUB_ENV"
          else
            echo "Could not extract CPU or Android version from revision"
            exit 1
          fi
          if [[ -s "$README_PATH" ]]; then
            BUILD_LINE=$(grep -m1 'oplus_build_kernel.sh' "$README_PATH" || true)
            if [[ -n "$BUILD_LINE" ]]; then
              CPUD=$(echo "$BUILD_LINE" | awk '{print $(NF-1)}')
              BUILD_METHOD=$(echo "$BUILD_LINE" | awk '{print $NF}')
              echo "CPUD=$CPUD" >> "$GITHUB_ENV"
              echo "BUILD_METHOD=$BUILD_METHOD" >> "$GITHUB_ENV"
            fi
          fi
          echo "value=${FILE_BASE}_Android${ANDROID_VERSION}" >> "$GITHUB_OUTPUT"
          
      - name: Debug Show Selected Inputs
        run: |
          echo "------------------------------"
          echo "Primary selected kernel config: ${{ github.event.inputs.FILE }}"
          echo "Extra selected kernel configs: ${{ github.event.inputs.EXTRA_FILES }}"
          echo "Current matrix kernel config: ${{ matrix.FILE }}"
          echo "Selected CPU: ${{ env.CPU }}"
          echo "Selected CPUD: ${{ env.CPUD }}"
          echo "Selected Android version: ${{ env.ANDROID_VERSION }}"
          echo "Selected build method: ${{ env.BUILD_METHOD }}"
          echo "Selected KSU type: ${{ github.event.inputs.KSU_TYPE }}"
          echo "Custom SUSFS_META: ${{ github.event.inputs.SUSFS_META }}"
          echo "Custom KSU_META: ${{ github.event.inputs.KSU_META }}"
          echo "Selected BBG: ${{ github.event.inputs.LSM_BBG }}"
          echo "Selected NETFILTER: ${{ github.event.inputs.NETFILTER }}"
          echo "Selected CCM: ${{ github.event.inputs.CCM }}"
          echo "Selected SUSFS development branch: ${{ github.event.inputs.SUSFS_DEV }}"
          echo "Selected Unicode bypass patch: ${{ github.event.inputs.UNICODE_BYPASS }}"
          echo "------------------------------"
          
      - name: Check Disk Space
        run: df -h

      - name: Create and Enable 3G Swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 3G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          
      - name: Set Shared Cache Environment
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' }}
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_oneplus" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.ccache_oneplus"
          echo "Shared cache directory: $HOME/.ccache_oneplus"
          
      - name: Configure Git
        run: |
          git config --global user.name "OnePlus"
          git config --global user.email "ubuntu-build@qq.com"
          mkdir kernel_workspace
          cd kernel_workspace
          git clone https://github.com/Numbersf/Action-Build.git -b SukiSU-Ultra
          
      - name: Reject Check
        run: |
          cat > /tmp/check_rejects.sh << 'EOF'
          check_rejects() {
            local SEARCH_DIR="${1:-.}"
            REJECT_FILES=$(find "$SEARCH_DIR" -name "*.rej" 2>/dev/null)
            if [ -z "$REJECT_FILES" ]; then
              return 0
            fi
            while IFS= read -r REJ_FILE; do
              ORIG_FILE="${REJ_FILE%.rej}"
              ORIG_FILE="${ORIG_FILE#./}"
              echo "::group::Patch hunk failed in ${ORIG_FILE}. Click to view details."
              cat "$REJ_FILE"
              echo "::endgroup::"
            done <<< "$REJECT_FILES"
          }
          EOF
          chmod +x /tmp/check_rejects.sh
          echo "REJ_CHECKER=/tmp/check_rejects.sh" >> "$GITHUB_ENV"
          
      - name: Restore APT Cache
        id: apt-cache
        uses: actions/cache@v5
        with:
          path: ~/apt-cache-debs
          key: apt-cache-${{ runner.os }}-${{ github.ref_name }}-v3

      - name: Install Dependencies
        run: |
          mkdir -p ~/apt-cache-debs
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" != "true" ]; then
            sudo apt-get update
          else
            echo "APT cache hit. Skipping apt-get update."
          fi
          sudo apt-get install -y --no-install-recommends -o Dir::Cache::Archives="$HOME/apt-cache-debs" \
            python3 git curl libelf-dev build-essential flex bison libssl-dev libncurses-dev \
            liblz4-tool zlib1g-dev libxml2-utils rsync unzip gawk dos2unix kmod libdw-dev \
            elfutils dwarves jq zip
          sudo rm -f ~/apt-cache-debs/lock
          sudo rm -rf ~/apt-cache-debs/partial
          
      - name: Install Ccache-ECS
        run: |
          LIB_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/lib"
          sudo cp -f "$LIB_DIR/ccache" /usr/bin/ccache
          sudo chmod +x /usr/bin/ccache
          
      - name: Restore Shared Ccache
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' }}
        id: restore-ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-
            ccache-${{ runner.os }}-${{ github.ref_name }}-oneplus-
            ccache-${{ runner.os }}-${{ github.ref_name }}-            
                  
      - name: Initialize Ccache
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' }}
        run: |
          INIT_FLAG="${{ env.CCACHE_DIR }}/.ccache_initialized"
          if command -v ccache >/dev/null 2>&1; then
            if [ ! -f "$INIT_FLAG" ]; then
              echo "Initializing ccache at ${{ env.CCACHE_DIR }}..."
              mkdir -p "${{ env.CCACHE_DIR }}"
              ccache -M ${{ env.CCACHE_MAXSIZE }}
              touch "$INIT_FLAG"
              echo "ccache initialization completed."
            else
              echo "ccache is already initialized. Updating max size."
              ccache -M ${{ env.CCACHE_MAXSIZE }}
            fi
          else
            echo "ccache is not installed. Skipping."
          fi
          ccache -s
          
      - name: Install Repo Tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo
          
      - name: Initialize Repo and Sync
        env:
          FILE: ${{ matrix.FILE }}
        run: |
          cd kernel_workspace

          mkdir -p .repo/manifests
          cp "$GITHUB_WORKSPACE/.repo/manifests_fallback/${FILE}.xml" ".repo/manifests/${FILE}.xml"

          BASE_URL="https://github.com/${MANIFEST_REPO}/${MANIFEST_REPO_NAME}.git"

          echo "Initializing repository from ${MANIFEST_REPO}/${MANIFEST_REPO_NAME} branch ${MANIFEST_BRANCH}..."

          repo init -u "$BASE_URL" -b "$MANIFEST_BRANCH" -m "${FILE}.xml" --depth=1 --no-clone-bundle --no-tags

          MANIFEST_FILE=".repo/manifests/${FILE}.xml"

          echo "Sanitizing active manifest after repo init..."

          python3 - "$MANIFEST_FILE" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          manifest = Path(sys.argv[1])

          remove_paths = {
              "kernel_platform/prebuilts/asuite",
              "kernel_platform/prebuilts/tradefed",
              "kernel_platform/tools/tradefederation/prebuilts",
          }

          remove_name_fragments = {
              "prebuilts/asuite",
              "prebuilts/tradefed",
              "tools/tradefederation/prebuilts",
          }

          tree = ET.parse(manifest)
          root = tree.getroot()

          removed = []

          for project in list(root.findall("project")):
              path = project.get("path") or ""
              name = project.get("name") or ""

              should_remove = (
                  path in remove_paths
                  or any(fragment in path for fragment in remove_name_fragments)
                  or any(fragment in name for fragment in remove_name_fragments)
              )

              if should_remove:
                  root.remove(project)
                  removed.append(path or name)

          tree.write(manifest, encoding="UTF-8", xml_declaration=True)

          if removed:
              print("Removed projects from active manifest:")
              for item in removed:
                  print(f"  - {item}")
          else:
              print("No matching test prebuilt projects found in active manifest.")
          PY

          echo "Verifying removed projects are gone from manifest..."

          if grep -E 'prebuilts/asuite|prebuilts/tradefed|tradefederation/prebuilts' "$MANIFEST_FILE"; then
            echo "Manifest still contains broken test prebuilts after sanitizing. Aborting."
            exit 9
          fi

          echo "Starting repo sync..."

          SYNC_OK=false

          for attempt in 1 2 3; do
            echo "repo sync attempt ${attempt}/3..."

            if repo sync -c -j8 --no-clone-bundle --no-tags --optimized-fetch --force-sync --fail-fast --verbose; then
              SYNC_OK=true
              break
            fi

            echo "::warning title=repo sync failed::Attempt ${attempt}/3 failed."

            echo "Cleaning partial git states before retry..."
            repo forall -c 'git reset --hard || true; git clean -ffd || true' || true

            sleep $((attempt * 20))
          done

          if [[ "$SYNC_OK" != "true" ]]; then
            echo "repo sync failed after 3 attempts."
            exit 11
          fi

          echo "Finalizing sync state..."
          echo "repo sync has finished successfully."

          KERNEL_REPOS=""
          KERNEL_REPOS_PATH=$(find . -type f -name "build.config.msm.common" | head -n 1)

          if [[ -n "$KERNEL_REPOS_PATH" ]]; then
            KERNEL_REPOS=$(echo "${KERNEL_REPOS_PATH#./}" | cut -d/ -f2)
            echo "KERNEL_REPOS=$KERNEL_REPOS" >> "$GITHUB_ENV"
          else
            echo "build.config.msm.common was not found. This may be an MTK manifest or a pure Kleaf build structure."
            echo "KERNEL_REPOS=" >> "$GITHUB_ENV"
          fi

          PATCH_DIRS=(kernel_platform/common)

          if [[ -n "$KERNEL_REPOS" ]]; then
            PATCH_DIRS+=(kernel_platform/"$KERNEL_REPOS")
          fi

          for dir in "${PATCH_DIRS[@]}"; do
            if [ -e "$dir/BUILD.bazel" ]; then
              sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' "$dir/BUILD.bazel"
            fi

            rm -f "$dir/android/abi_gki_protected_exports_"* 2>/dev/null || echo "No protected exports found in $dir"
          done

          if [[ -f kernel_platform/common/build.config.gki ]] && grep -q 'check_defconfig' kernel_platform/common/build.config.gki; then
            sed -i 's/check_defconfig//' kernel_platform/common/build.config.gki
          fi

          KLEAF_COMMON="kernel_platform/build/kernel/kleaf/common_kernels.bzl"

          if [[ -f "$KLEAF_COMMON" ]] && grep -q 'check_defconfig = None,' "$KLEAF_COMMON"; then
            sed -i 's/check_defconfig = None,/check_defconfig = "disabled",/' "$KLEAF_COMMON"
            sed -i 's/if check_defconfig == None:/if False:  # check_defconfig == None:/' "$KLEAF_COMMON"
          fi
          
      - name: Kernel Version Handling
        run: |
          cd kernel_workspace/kernel_platform

          KMI=""

          for f in ./common/build.config.constants ./common/build.config.common; do
            if [ -f "$f" ]; then
              KMI=$(grep -m1 '^BRANCH=' "$f" | cut -d= -f2)
              [ -n "$KMI" ] && break
            fi
          done

          if [[ -z "$KMI" && -n "$KERNEL_REPOS" ]]; then
            KMI=$(grep -m1 '^android' "./$KERNEL_REPOS/android/ACK_SHA" | cut -d- -f1,2)
          fi

          if [ -n "$KMI" ]; then
            echo "KMI=$KMI" >> "$GITHUB_ENV"
            echo "KANDROID_VERSION=${KMI%-*}" >> "$GITHUB_ENV"
            echo "KERNEL_VERSION=${KMI#*-}" >> "$GITHUB_ENV"
          else
            echo "No KMI was found in build.config files or ACK_SHA files. Aborting."
            exit 12
          fi

          VERSIONLEVEL=$(awk '/^VERSION =/ {print $3}' ./common/Makefile)
          PATCHLEVEL=$(awk '/^PATCHLEVEL =/ {print $3}' ./common/Makefile)
          SUBLEVEL=$(awk '/^SUBLEVEL =/ {print $3}' ./common/Makefile)

          echo "VERSIONLEVEL=$VERSIONLEVEL" >> "$GITHUB_ENV"
          echo "PATCHLEVEL=$PATCHLEVEL" >> "$GITHUB_ENV"
          echo "SUBLEVEL=$SUBLEVEL" >> "$GITHUB_ENV"

          ORIG_VERSION=$(awk '/^VERSION =/ {v=$3} /^PATCHLEVEL =/ {p=$3} /^SUBLEVEL =/ {s=$3} END {print v"."p"."s}' ./common/Makefile)

          echo "Kernel version unchanged: $ORIG_VERSION"

          echo "CKERNEL_VERSION=$ORIG_VERSION" >> "$GITHUB_ENV"
          echo "KERNEL_FULL_VER=$ORIG_VERSION" >> "$GITHUB_ENV"
          echo "KERNEL_SHORT_PATCH_VERSION=$(echo "$ORIG_VERSION" | cut -d. -f1,2 | tr '.' '_')" >> "$GITHUB_ENV"

          if [[ "${KMI#*-}" == "6.12" ]]; then
            echo "IS_612_KERNEL=true" >> "$GITHUB_ENV"
            echo "Detected Linux 6.12 kernel. ThinLTO cache restore/save will be skipped and LTO will be forced to none."
          else
            echo "IS_612_KERNEL=false" >> "$GITHUB_ENV"
            echo "Detected non-6.12 kernel. ThinLTO cache behavior remains enabled where applicable."
          fi

          echo "Resolved KMI: $KMI"
          echo "Resolved Android KMI version: ${KMI%-*}"
          echo "Resolved kernel base version: ${KMI#*-}"
          echo "Resolved full kernel version: $ORIG_VERSION"

      - name: Restore ThinLTO Cache
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' && env.IS_612_KERNEL != 'true' }}
        id: restore-thinlto
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/.thinlto-cache
          key: thinlto-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-${{ github.run_id }}
          restore-keys: |
            thinlto-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-
            thinlto-${{ runner.os }}-${{ github.ref_name }}-oneplus-
            thinlto-${{ runner.os }}-${{ github.ref_name }}-
      
      - name: Rust Version Handling
        run: |
          cd kernel_workspace/kernel_platform
          RUSTC_VERSION=""
          if [[ -f ./common/build.config.constants ]]; then
            RUSTC_VERSION=$(grep '^RUSTC_VERSION=' ./common/build.config.constants | cut -d'=' -f2 || true)
          fi
          if [[ -n "$RUSTC_VERSION" ]]; then
            echo "RUSTC_VERSION=$RUSTC_VERSION"
            echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"
            echo "ENABLE_RUST=true" >> "$GITHUB_ENV"
          else
            echo "RUSTC_VERSION was not found. Rust build support is disabled."
            echo "ENABLE_RUST=false" >> "$GITHUB_ENV"
          fi
          
      - name: Custom Kernel Suffix if set
        if: ${{ github.event.inputs.SUFFIX != '' && github.event.inputs.SUFFIX != '-1' }}
        run: |
          cd kernel_workspace/kernel_platform

          SUFFIX="${{ github.event.inputs.SUFFIX }}"
          CUSTOM_LOCALVERSION="-${KANDROID_VERSION}-${SUFFIX}"

          echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"
          echo "Using custom LOCALVERSION: $CUSTOM_LOCALVERSION"

          SETLOCALVERSION_FILES=(
            ./common/scripts/setlocalversion
            ./external/dtc/scripts/setlocalversion
          )

          if [[ -n "${KERNEL_REPOS:-}" ]]; then
            SETLOCALVERSION_FILES+=(./"$KERNEL_REPOS"/scripts/setlocalversion)
          fi

          for f in "${SETLOCALVERSION_FILES[@]}"; do
            [ -f "$f" ] || continue

            echo "Cleaning dirty suffix handling in: $f"

            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
            
            chmod +x "$f"
          done
          
      - name: Custom Kernel Random Suffix if empty
        if: ${{ github.event.inputs.SUFFIX == '' }}
        run: |
          cd kernel_workspace/kernel_platform

          RANDOM_DIGIT=$(od -An -N1 -tu1 < /dev/urandom | tr -d '[:space:]' | awk '{print $1 % 11}')
          RANDOM_HASH=$(od -An -N7 -tx1 /dev/urandom | tr -d ' \n')
          RANDOM_SUFFIX="${RANDOM_DIGIT}-o-g${RANDOM_HASH}"
          CUSTOM_LOCALVERSION="-${KANDROID_VERSION}-${RANDOM_SUFFIX}"

          echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"
          echo "Using random LOCALVERSION: $CUSTOM_LOCALVERSION"

          SETLOCALVERSION_FILES=(
            ./common/scripts/setlocalversion
            ./external/dtc/scripts/setlocalversion
          )

          if [[ -n "${KERNEL_REPOS:-}" ]]; then
            SETLOCALVERSION_FILES+=(./"$KERNEL_REPOS"/scripts/setlocalversion)
          fi

          for f in "${SETLOCALVERSION_FILES[@]}"; do
            [ -f "$f" ] || continue

            echo "Cleaning dirty suffix handling in: $f"

            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
           
            chmod +x "$f"
          done

      - name: Disable Custom Kernel Suffix
        if: ${{ github.event.inputs.SUFFIX == '-1' }}
        run: |
          echo "CUSTOM_LOCALVERSION=" >> "$GITHUB_ENV"
          echo "Custom kernel LOCALVERSION is disabled."
          
      - name: Add SukiSU Ultra
        run: |
          cd kernel_workspace/kernel_platform

          MANAGER_BRANCH="main"
          KSU_META="${{ github.event.inputs.KSU_META }}"

          if [[ "$(grep -o '/' <<< "$KSU_META" | wc -l)" -lt 2 ]]; then
            echo "Invalid KSU_META format. Expected: branch/custom-version/commit-hash"
            exit 10
          fi

          IFS='/' read -r BRANCH_NAME CUSTOM_TAG MANUAL_HASH <<< "$KSU_META"

          echo "Branch name: $BRANCH_NAME"
          [[ -n "$CUSTOM_TAG" ]] && echo "Custom version tag: $CUSTOM_TAG" || echo "Custom version tag is disabled."
          [[ -n "$MANUAL_HASH" ]] && echo "Manual commit hash: $MANUAL_HASH" || echo "Manual commit hash is disabled."

          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/${MANAGER_BRANCH}/kernel/setup.sh" | bash -s "$BRANCH_NAME"

          cd ./KernelSU

          if [[ -n "$MANUAL_HASH" ]]; then
            git fetch origin "$BRANCH_NAME" --depth=50
            git checkout "$MANUAL_HASH"
            SHORT_HASH=${MANUAL_HASH:0:8}
          fi

          KSU_VERSION_TAG=$(curl -fsSL https://api.github.com/repos/SukiSU-Ultra/SukiSU-Ultra/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')

          if [[ -z "$KSU_VERSION_TAG" || "$(printf '%s\n' "$KSU_VERSION_TAG" "3.1.7" | sort -V | head -n1)" != "3.1.7" ]]; then
            KSU_VERSION_TAG="3.1.7"
          fi

          echo "KSU_VERSION_TAG=$KSU_VERSION_TAG" >> "$GITHUB_ENV"

          GIT_HASH=$(git rev-parse --short HEAD)
          echo "GIT_HASH=$GIT_HASH"

          if [[ -n "$MANUAL_HASH" ]]; then
            USE_HASH="$SHORT_HASH"
          else
            USE_HASH="$GIT_HASH"
          fi

          if [[ -z "$CUSTOM_TAG" ]]; then
            VERSION_FULL="v$KSU_VERSION_TAG-$USE_HASH@$BRANCH_NAME"
          else
            VERSION_FULL="v$KSU_VERSION_TAG-$CUSTOM_TAG@$BRANCH_NAME[$USE_HASH]"
          fi

          ESC_VERSION_FULL=$(printf '%s' "$VERSION_FULL" | sed 's/[&|\\/]/\\&/g')
          ESC_KSU_VERSION_TAG=$(printf '%s' "$KSU_VERSION_TAG" | sed 's/[&|\\/]/\\&/g')

          if grep -q '^KSU_VERSION_FULL := ' kernel/Makefile; then
            sed -i "s|^KSU_VERSION_FULL := .*|KSU_VERSION_FULL := $ESC_VERSION_FULL|" kernel/Makefile
          else
            awk -v full="$VERSION_FULL" '
              /^REPO_OWNER :=/ && !done {
                print
                print ""
                print "KSU_VERSION_FULL := " full
                done=1
                next
              }
              { print }
            ' kernel/Makefile > kernel/Makefile.tmp && mv kernel/Makefile.tmp kernel/Makefile
          fi

          if grep -q '^KSU_VERSION_API := ' kernel/Makefile; then
            sed -i "s|^KSU_VERSION_API := .*|KSU_VERSION_API := $ESC_KSU_VERSION_TAG|" kernel/Makefile
          fi

          KSU_VERSION_OFFSET=40033
          KSU_COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo 786)
          KSU_VERSION=$((KSU_COMMIT_COUNT + KSU_VERSION_OFFSET))
          
          echo "KSU_VERSION_OFFSET=$KSU_VERSION_OFFSET"
          echo "KSU_COMMIT_COUNT=$KSU_COMMIT_COUNT"
          echo "Calculated SukiSU version: $KSU_VERSION"
          
          echo "KSUVER=$KSU_VERSION" >> "$GITHUB_ENV"

          echo "::group::Final KernelSU Makefile version preview"
          grep -nE '^(REPO_OWNER|REPO_NAME|REPO_BRANCH|KSU_VERSION_API|KSU_VERSION_FULL|VERSION_TAG|GIT_BIN|CURL_BIN)' kernel/Makefile
          echo "::endgroup::"
          
      - name: Apply Fake Patches
        if: ${{ github.event.inputs.SUSFS_META != '-1' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          if [ "$KMI" = "android12-5.10" ]; then
            if [ "$SUBLEVEL" -le "43" ]; then
              perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/;' fs/proc/base.c
            fi
            if [ "$SUBLEVEL" -le "117" ]; then
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi
          if [ "$KMI" = "android13-5.15" ]; then
            if [ "$SUBLEVEL" -le "41" ]; then
              sed -i '/^#include <linux\/shmem_fs.h>$/a #include <linux/mnt_idmapping.h>' fs/namespace.c
              sed -i '/^#include <linux\/compat.h>$/a #include <linux/mnt_idmapping.h>' fs/open.c
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
            if [ "$SUBLEVEL" -ge "123" ]; then
              sed -i '/#include <linux\/swap_slots\.h>/d' ./mm/memory.c
            fi
            if [ "$SUBLEVEL" -ge "197" ]; then
              sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
            fi
            if [ "$SUBLEVEL" -ge "206" ]; then
              sed -i '/^#include <trace\/hooks\/mm.h>$/d' fs/proc/task_mmu.c
            fi
          fi
          if [ "$KMI" = "android14-6.1" ]; then
            if [ "$SUBLEVEL" -le "141" ]; then
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
            if [ "$SUBLEVEL" -ge "157" ]; then
              sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
            fi
          fi
          if [ "$KMI" = "android15-6.6" ]; then
            if [ "$SUBLEVEL" -le "30" ]; then
              sed -i '/smap_gather_stats(vma, &mss, last_vma_end);/a\last_vma_end = vma->vm_end;' fs/proc/task_mmu.c
              perl -0777 -i -pe '@l=split/\n/;for($i=$#l;$i>=0;$i--){if($l[$i]=~/last_vma_end = vma->vm_end;/){$l[$i]="\t\t\t\t".$l[$i];splice(@l,$i+1,0,"\t\t\t}");for($j=$i;$j>=0;$j--){if($l[$j]=~/if\s*\(vma->vm_end > last_vma_end\)/){$l[$j]=~s/\)\s*$/) {/;last}}last}}$_=join"\n",@l' fs/proc/task_mmu.c
              sed -i '/#include <trace\/hooks\/blk\.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c
              sed -i -e '/int ret = 0, copied = 0;/a \\tunsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \\tpagemap_entry_t \*res = NULL;' ./fs/proc/task_mmu.c
            fi
            if [ "$SUBLEVEL" -le "57" ]; then
              sed -i '/^#include <linux\/sched\/sysctl.h>$/a #include <linux/zswap.h>' mm/memory.c
            fi
            if [ "$SUBLEVEL" -le "92" ]; then
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
          fi
          if [ "$KMI" = "android16-6.12" ]; then
            if [ "$SUBLEVEL" -ge "58" ]; then
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/exec.c
            fi
          fi
          
      - name: Apply Patches SukiSU Ultra
        env:
          FILE: ${{ matrix.FILE }}
        run: |
          cd kernel_workspace

          if [ "${{ github.event.inputs.SUSFS_META }}" != "-1" ]; then
            SUSFS_META="${{ github.event.inputs.SUSFS_META }}"

            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.KANDROID_VERSION }}-${{ env.KERNEL_VERSION }}${{ github.event.inputs.SUSFS_DEV == 'true' && '-dev' || '' }}

            cd susfs4ksu

            if [ -n "$SUSFS_META" ]; then
              if [[ "$SUSFS_META" =~ ^[0-9]+$ ]]; then
                git checkout HEAD~$SUSFS_META
              else
                git checkout "$SUSFS_META"
              fi
            else
              echo "SUSFS_META is empty. Using the latest upstream SUSFS."
            fi

            SUSVER=""

            for candidate in \
              ./kernel_patches/include/linux/susfs.h \
              ./kernel_patches/include/linux/susfs_def.h \
              ./kernel_patches/fs/susfs.c \
              ./include/linux/susfs.h \
              ./include/linux/susfs_def.h
            do
              if [[ -f "$candidate" ]]; then
                SUSVER="$(grep -hoP 'SUSFS_VERSION[[:space:]]*"?=?[[:space:]]*"?v?\K[0-9]+(\.[0-9]+)*' "$candidate" 2>/dev/null | head -n 1 || true)"

                if [[ -n "$SUSVER" ]]; then
                  echo "Detected SUSFS version from $candidate: $SUSVER"
                  break
                fi
              fi
            done

            if [[ -z "$SUSVER" ]]; then
              SUSVER="$(grep -RhoP 'SUSFS_VERSION[[:space:]]*["=: ]+[[:space:]]*"?v?\K[0-9]+(\.[0-9]+)*' . 2>/dev/null | head -n 1 || true)"
            fi

            if [[ -z "$SUSVER" ]]; then
              SUSVER="$(git rev-parse --short HEAD || echo unknown)"
              echo "Could not detect SUSFS version. Falling back to commit hash: $SUSVER"
            else
              echo "Detected SUSFS version: $SUSVER"
            fi

            echo "Final SUSFS version label: $SUSVER"
            echo "SUSVER=$SUSVER" >> "$GITHUB_ENV"

            cd ..
          else
            echo "SUSVER=disabled" >> "$GITHUB_ENV"
          fi

          cd kernel_platform

          if [ "${{ github.event.inputs.SUSFS_META }}" != "-1" ]; then
            echo "Copying SUSFS patch files..."
            cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.KANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          fi

          cd ./common

          if [ "$KMI" == "android13-5.15" ] && [ "$SUBLEVEL" -lt 123 ]; then
            echo "Applying compatibility fix for Android 13 5.15 kernels below 5.15.123..."
            cp "${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/patches/fix_5.15.legacy" ./fix_5.15.legacy.patch
            patch -p1 < fix_5.15.legacy.patch
            echo "Android 13 5.15 legacy compatibility patch completed."
          fi

          if [ "${{ github.event.inputs.SUSFS_META }}" != "-1" ]; then
            echo "Applying SUSFS patch..."

            set +e
            patch -p1 < 50_add_susfs_in_gki-${{ env.KANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch
            PATCH_STATUS=$?
            set -e

            source "$REJ_CHECKER"
            check_rejects .

            if [[ "$PATCH_STATUS" -ne 0 ]]; then
              echo "::warning title=SUSFS patch returned non-zero::patch exited with status $PATCH_STATUS. Reject files were checked above."
            fi

            echo "SUSFS patch completed."
          else
            source "$REJ_CHECKER"
            check_rejects .
          fi
          
      - name: Revert Fake Patches
        if: ${{ github.event.inputs.SUSFS_META != '-1' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          if [ "$KMI" = "android12-5.10" ]; then
            if [ "$SUBLEVEL" -le "43" ]; then
              sed -i 's/^size_t this_len = min_t(size_t, count, PAGE_SIZE);$/int this_len = min_t(int, count, PAGE_SIZE);/' fs/proc/base.c
            fi
            if [ "$SUBLEVEL" -le "117" ]; then
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
            fi
          fi
          if [ "$KMI" = "android13-5.15" ]; then
            if [ "$SUBLEVEL" -le "41" ]; then
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/namespace.c
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/open.c
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
              sed -i 's|i_uid_into_mnt(i_user_ns(&fi->inode), &fi->inode).val|i_uid_into_mnt(\&init_user_ns, \&fi->inode).val|g' fs/susfs.c
              sed -i 's|i_uid_into_mnt(i_user_ns(inode), inode).val|i_uid_into_mnt(\&init_user_ns, inode).val|g' fs/susfs.c
            fi
            if [ "$SUBLEVEL" -ge "123" ]; then
              sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_MAP/i #include <linux/swap_slots.h>' ./mm/memory.c
            fi
            if [ "$SUBLEVEL" -ge "197" ]; then
              sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            fi
            if [ "$SUBLEVEL" -ge "206" ]; then
              sed -i '/^#include <linux\/pkeys.h>$/a #include <trace/hooks/mm.h>' fs/proc/task_mmu.c
            fi
          fi
          if [ "$KMI" = "android14-6.1" ]; then
            if [ "$SUBLEVEL" -le "141" ]; then
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
            if [ "$SUBLEVEL" -ge "157" ]; then
              sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            fi
          fi
          if [ "$KMI" = "android15-6.6" ]; then
            if [ "$SUBLEVEL" -le "30" ]; then
              sed -i '/#include <trace\/hooks\/fs\.h>/d' ./fs/namespace.c
              sed -i -e '/unsigned int nr_subpages \= __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c
            fi
            if [ "$SUBLEVEL" -le "57" ]; then
              sed -i '/^#include <linux\/zswap.h>$/d' mm/memory.c
            fi
            if [ "$SUBLEVEL" -le "92" ]; then
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
          fi
          if [ "$KMI" = "android16-6.12" ]; then
            if [ "$SUBLEVEL" -ge "58" ]; then
              grep -q '^#include <linux/dma-buf.h>$' fs/exec.c || sed -i '/^#include /a #include <linux/dma-buf.h>' fs/exec.c
            fi
          fi
          
      - name: Fix SukiSU LSM API for Linux 6.12
        run: |
          cd kernel_workspace/kernel_platform

          if (( VERSIONLEVEL < 6 || (VERSIONLEVEL == 6 && PATCHLEVEL < 12) )); then
            echo "Kernel version is ${VERSIONLEVEL}.${PATCHLEVEL}.${SUBLEVEL}. LSM API patch is only needed for 6.12+ style LSM API. Skipping."
            exit 0
          fi

          echo "Searching for SukiSU LSM hook file..."

          LSM_FILE=""

          # Preferred historical path.
          LSM_FILE="$(find . -type f -path '*/drivers/kernelsu/hook/lsm_hook.c' | head -n 1 || true)"

          # Broader fallback: any lsm_hook.c.
          if [[ -z "$LSM_FILE" ]]; then
            LSM_FILE="$(find . -type f -name 'lsm_hook.c' | head -n 1 || true)"
          fi

          # Strong fallback: any file containing the old security_add_hooks call.
          if [[ -z "$LSM_FILE" ]]; then
            LSM_FILE="$(grep -RIl 'security_add_hooks(ksu_hooks' . \
              --include='*.c' --include='*.h' 2>/dev/null | head -n 1 || true)"
          fi

          # Last fallback: any file containing ksu_hooks.
          if [[ -z "$LSM_FILE" ]]; then
            LSM_FILE="$(grep -RIl 'ksu_hooks' . \
              --include='*.c' --include='*.h' 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "$LSM_FILE" || ! -f "$LSM_FILE" ]]; then
            echo "::warning title=SukiSU LSM hook not found::Could not find lsm_hook.c, security_add_hooks(ksu_hooks), or ksu_hooks. Skipping LSM API patch."

            echo "::group::KernelSU/SukiSU path diagnostics"
            find . -maxdepth 5 \( -iname '*kernelsu*' -o -iname '*ksu*' -o -iname '*suki*' \) 2>/dev/null | head -n 200 || true
            echo "::endgroup::"

            echo "::group::security_add_hooks diagnostics"
            grep -RIn 'security_add_hooks' . --include='*.c' --include='*.h' 2>/dev/null | head -n 100 || true
            echo "::endgroup::"

            exit 0
          fi

          LSM_HEADER="common/include/linux/lsm_hooks.h"

          if [[ ! -f "$LSM_HEADER" ]]; then
            LSM_HEADER="$(find . -type f -path '*/include/linux/lsm_hooks.h' | head -n 1 || true)"
          fi

          if [[ -z "$LSM_HEADER" || ! -f "$LSM_HEADER" ]]; then
            echo "Could not find lsm_hooks.h"
            exit 1
          fi

          echo "Patching SukiSU LSM hook file: $LSM_FILE"
          echo "Using LSM header: $LSM_HEADER"

          if grep -q 'LSM_ID_UNDEF' "$LSM_HEADER"; then
            USE_LSM_ID_UNDEF=true
          else
            USE_LSM_ID_UNDEF=false
          fi

          echo "USE_LSM_ID_UNDEF=$USE_LSM_ID_UNDEF"

          python3 - "$LSM_FILE" "$USE_LSM_ID_UNDEF" <<'PY'
          import sys
          import re
          from pathlib import Path

          path = Path(sys.argv[1])
          use_lsm_id_undef = sys.argv[2] == "true"

          text = path.read_text()

          old_call = 'security_add_hooks(ksu_hooks, ARRAY_SIZE(ksu_hooks), "ksu");'

          if use_lsm_id_undef:
              lsmid_block = '''
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 12, 0)
          static const struct lsm_id ksu_lsmid = {
              .name = "ksu",
              .id = LSM_ID_UNDEF,
          };
          #endif
          '''
          else:
              lsmid_block = '''
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 12, 0)
          static const struct lsm_id ksu_lsmid = {
              .name = "ksu",
          };
          #endif
          '''

          new_call = '''#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 12, 0)
              security_add_hooks(ksu_hooks, ARRAY_SIZE(ksu_hooks), &ksu_lsmid);
          #else
              security_add_hooks(ksu_hooks, ARRAY_SIZE(ksu_hooks), "ksu");
          #endif'''

          if old_call not in text and '&ksu_lsmid' in text:
              print("LSM API patch already appears to be applied.")
              path.write_text(text)
              sys.exit(0)

          if 'static const struct lsm_id ksu_lsmid' not in text:
              marker = 'static struct security_hook_list ksu_hooks[]'

              if marker not in text:
                  marker = 'static struct security_hook_list'

              if marker not in text:
                  print("Could not find security_hook_list marker. File may use a newer SukiSU LSM layout.")
                  sys.exit(0)

              text = text.replace(marker, lsmid_block + marker, 1)

          if old_call in text:
              text = text.replace(old_call, new_call, 1)
          else:
              text_new = re.sub(
                  r'security_add_hooks\(\s*ksu_hooks\s*,\s*ARRAY_SIZE\(ksu_hooks\)\s*,\s*"ksu"\s*\)\s*;',
                  new_call,
                  text,
                  count=1,
              )

              if text_new == text:
                  print("Did not find old security_add_hooks string call. File may already be compatible.")
              else:
                  text = text_new

          path.write_text(text)
          PY

          echo "::group::SukiSU LSM hook preview"
          grep -n -A10 -B10 'ksu_lsmid\|security_add_hooks\|ksu_hooks' "$LSM_FILE" || true
          echo "::endgroup::"

          echo "::group::SukiSU LSM verification"

          if grep -q '&ksu_lsmid' "$LSM_FILE"; then
            echo "OK: LSM file uses &ksu_lsmid for Linux 6.12+ registration."
          else
            echo "::warning title=LSM verification::&ksu_lsmid was not found in $LSM_FILE"
          fi

          grep -n -A4 -B4 'security_add_hooks' "$LSM_FILE" || true

          echo "::endgroup::"
          
      - name: Apply UNICODE_BYPASS
        if: ${{ github.event.inputs.UNICODE_BYPASS == 'true' }}
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/patches"
          cd kernel_workspace/kernel_platform/common
          if [ "$VERSIONLEVEL" -lt 6 ]; then
            patch -p1 --forward < "${PATCH_DIR}/unicode_bypass_fix_6.1-.patch" || true
          else
            patch -p1 --forward < "${PATCH_DIR}/unicode_bypass_fix_6.1+.patch" || true
          fi
          source "$REJ_CHECKER"
          check_rejects .
          
      - name: Apply LSM_BBG
        if: ${{ github.event.inputs.LSM_BBG == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          echo "Enabling kernel-level baseband protection support..."
          curl -LSs https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' ./security/Kconfig
      
      - name: Add Configuration Settings
        run: |
          cd kernel_workspace/kernel_platform/common

          CONFIG_FILE=./arch/arm64/configs/gki_defconfig

          set_config() {
            local val="$1"
            local key="${val%%=*}"

            if grep -qF "${key}=" "$CONFIG_FILE" || grep -qF "# ${key} is not set" "$CONFIG_FILE"; then
              VAL="$val" awk -v key="$key" '
                $0 == "# " key " is not set" || index($0, key "=") == 1 { print ENVIRON["VAL"]; next }
                { print }
              ' "$CONFIG_FILE" > "${CONFIG_FILE}.tmp" && mv "${CONFIG_FILE}.tmp" "$CONFIG_FILE" || rm -f "${CONFIG_FILE}.tmp"
            else
              printf '%s\n' "$val" >> "$CONFIG_FILE"
            fi
          }

          set_config "CONFIG_KSU=y"
          set_config "CONFIG_KPM=n"

          if [ "${{ github.event.inputs.SUSFS_META }}" != "-1" ]; then
            set_config "CONFIG_KSU_SUSFS=y"
            set_config "CONFIG_KSU_SUSFS_SUS_PATH=y"
            set_config "CONFIG_KSU_SUSFS_SUS_MAP=y"
            set_config "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            set_config "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            set_config "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            set_config "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            set_config "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            set_config "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            set_config "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          else
            set_config "CONFIG_KSU_SUSFS=n"
          fi

          set_config "CONFIG_TMPFS_XATTR=y"
          set_config "CONFIG_TMPFS_POSIX_ACL=y"

          if [ "${{ github.event.inputs.CCM }}" = "true" ]; then
            set_config "CONFIG_TCP_CONG_ADVANCED=y"
            set_config "CONFIG_TCP_CONG_BBR=y"
            set_config "CONFIG_NET_SCH_FQ=y"
            set_config "CONFIG_TCP_CONG_BIC=n"
            set_config "CONFIG_TCP_CONG_WESTWOOD=n"
            set_config "CONFIG_TCP_CONG_HTCP=n"
            set_config "CONFIG_IP_ECN=y"
            set_config "CONFIG_TCP_ECN=y"
            set_config "CONFIG_IPV6_ECN=y"
            set_config "CONFIG_IP_NF_TARGET_ECN=y"
          fi

          if [ "${{ github.event.inputs.LSM_BBG }}" = "true" ]; then
            set_config "CONFIG_BBG=y"
          fi

          if [ "${{ github.event.inputs.NETFILTER }}" = "true" ]; then
            if [[ "$KERNEL_VERSION" != "6.12" && "${CPU}" != mt* ]]; then
              set_config "CONFIG_BPF_STREAM_PARSER=y"
            fi

            set_config "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            set_config "CONFIG_NETFILTER_XT_SET=y"
            set_config "CONFIG_IP_SET=y"
            set_config "CONFIG_IP_SET_MAX=65534"
            set_config "CONFIG_IP_SET_BITMAP_IP=y"
            set_config "CONFIG_IP_SET_BITMAP_IPMAC=y"
            set_config "CONFIG_IP_SET_BITMAP_PORT=y"
            set_config "CONFIG_IP_SET_HASH_IP=y"
            set_config "CONFIG_IP_SET_HASH_IPMARK=y"
            set_config "CONFIG_IP_SET_HASH_IPPORT=y"
            set_config "CONFIG_IP_SET_HASH_IPPORTIP=y"
            set_config "CONFIG_IP_SET_HASH_IPPORTNET=y"
            set_config "CONFIG_IP_SET_HASH_IPMAC=y"
            set_config "CONFIG_IP_SET_HASH_MAC=y"
            set_config "CONFIG_IP_SET_HASH_NETPORTNET=y"
            set_config "CONFIG_IP_SET_HASH_NET=y"
            set_config "CONFIG_IP_SET_HASH_NETNET=y"
            set_config "CONFIG_IP_SET_HASH_NETPORT=y"
            set_config "CONFIG_IP_SET_HASH_NETIFACE=y"
            set_config "CONFIG_IP_SET_LIST_SET=y"
            set_config "CONFIG_IP6_NF_NAT=y"
            set_config "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          fi
          
          if [[ "$ENABLE_RUST" == "true" ]]; then
            set_config "CONFIG_ANDROID_BINDER_IPC_RUST=m"
            set_config "CONFIG_RUST=y"
          fi

          echo "::group::Requested gki_defconfig KSU/Rust entries"
          grep -nE '^CONFIG_(KSU|RUST|ANDROID_BINDER_IPC_RUST)' "$CONFIG_FILE" || true
          echo "::endgroup::"
          
      - name: Fix IPv6_NAT Error
        if: ${{ github.event.inputs.NETFILTER == 'true' }}
        run: |
          PATCH_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Action-Build/patches"
          cd kernel_workspace/kernel_platform/common
          if [[ "${CPU}" == sm* ]]; then
            echo "Applying possible IPv6 NAT device detection fix..."
            patch -p1 -F 3 < "${PATCH_DIR}/IPv6_NAT_FIX.patch"
          else
            echo "This device does not support IPv6 NAT. Skipping."
          fi
          
      - name: Custom BUILD_TIME
        if: ${{ github.event.inputs.BUILD_TIME != '-1' }}
        shell: bash
        run: |
          INPUT_TIME="${{ github.event.inputs.BUILD_TIME }}"

          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "F" ]]; then
            DATESTR="$INPUT_TIME"
            echo "Using input BUILD_TIME: $DATESTR"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
            echo "Using current UTC time as fallback: $DATESTR"
          fi

          echo "KBUILD_BUILD_TIMESTAMP=${DATESTR}" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          cd kernel_workspace/kernel_platform/

          MKCOMPILE_FILES=(./common/scripts/mkcompile_h)

          if [[ -n "${KERNEL_REPOS:-}" ]]; then
            MKCOMPILE_FILES+=(./"$KERNEL_REPOS"/scripts/mkcompile_h)
          fi

          for f in "${MKCOMPILE_FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "Patching mkcompile_h with BUILD_TIME=$DATESTR"

              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\(.*?\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          done
          
      - name: Disable GPUEB
        if: ${{ env.KERNEL_VERSION == '5.10' && startsWith(env.CPU, 'mt') }}
        run: |
          echo "Disabling GPUEB for MTK kernel 5.10"
          sed -i '/obj-y.*gpueb/d' kernel_workspace/kernel-5.10/drivers/gpu/mediatek/Makefile
          
      - name: Build Kernel
        run: |
          cd kernel_workspace/kernel_platform

          if [[ -f ./common/build.config.arm ]] && grep -q '^LLVM_IAS=1' ./common/build.config.arm; then
            USE_LLVM_IAS=true
          else
            USE_LLVM_IAS=false
          fi

          CLANG_PREBUILT_NAME=$(find "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform" -maxdepth 1 -type d -name 'prebuilts*' -exec test -d '{}/clang/host/linux-x86' \; -print | head -1)
          CLANG_PREBUILT_NAME=$(basename "${CLANG_PREBUILT_NAME:-}")
          echo "CLANG_PREBUILT_NAME=$CLANG_PREBUILT_NAME"

          KERNEL_BUILD_TOOLS_PREBUILT_NAME=$(find "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform" -maxdepth 1 -type d -name 'prebuilts*' -exec test -d '{}/kernel-build-tools' \; -print | head -1)
          KERNEL_BUILD_TOOLS_PREBUILT_NAME=$(basename "${KERNEL_BUILD_TOOLS_PREBUILT_NAME:-}")
          echo "KERNEL_BUILD_TOOLS_PREBUILT_NAME=$KERNEL_BUILD_TOOLS_PREBUILT_NAME"

          if [[ "$ENABLE_RUST" == "true" ]]; then
            RUST_TOOLS_PREBUILT_NAME=$(find "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform" -maxdepth 1 -type d -name 'prebuilts*' -exec test -d '{}/rust' \; -print | head -1)
            RUST_TOOLS_PREBUILT_NAME=$(basename "${RUST_TOOLS_PREBUILT_NAME:-}")
            echo "RUST_TOOLS_PREBUILT_NAME=$RUST_TOOLS_PREBUILT_NAME"
          fi

          CLANG_PREBUILT_BIN=""

          if [[ -f ./common/build.config.common ]]; then
            CLANG_PREBUILT_BIN=$(grep '^CLANG_PREBUILT_BIN=' ./common/build.config.common | cut -d'=' -f2-)
          fi

          if [[ -z "$CLANG_PREBUILT_BIN" ]]; then
            CLANG_PREBUILT_BIN="${CLANG_PREBUILT_NAME}/clang/host/linux-x86/clang-zakozako/bin"
          fi

          if [[ "$CLANG_PREBUILT_BIN" =~ clang-(r[0-9a-z]+) ]]; then
            CLANG_VERSION="${BASH_REMATCH[1]}"
          else
            if [[ -f ./common/build.config.constants ]]; then
              CLANG_VERSION=$(grep '^CLANG_VERSION=' ./common/build.config.constants | cut -d'=' -f2 || true)
            fi
          fi

          if [[ -z "$CLANG_VERSION" ]]; then
            echo "Could not detect Clang version. Official fallback step is disabled, so aborting."
            exit 13
          fi

          CLANG_PREBUILT_BIN="${CLANG_PREBUILT_BIN/\$\{CLANG_VERSION\}/$CLANG_VERSION}"
          CLANG_PREBUILT_BIN="${CLANG_PREBUILT_BIN/clang-zakozako/clang-${CLANG_VERSION}}"

          echo "CLANG_PREBUILT_BIN=$CLANG_PREBUILT_BIN"
          echo "CLANG_VERSION=$CLANG_VERSION"
          echo "USE_LLVM_IAS=$USE_LLVM_IAS"

          set +u
          source "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/build/kernel/_setup_env.sh" 2>/dev/null || true
          set -u

          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_PREBUILT_BIN:$PATH"

          CLANG_LIB_PATH="${CLANG_PREBUILT_BIN%/bin}"

          if [[ -d "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_LIB_PATH/lib" ]]; then
            export LIBCLANG_PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_LIB_PATH/lib"
          elif [[ -d "$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/clang-${CLANG_VERSION}/lib" ]]; then
            export LIBCLANG_PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/clang-${CLANG_VERSION}/lib"
          else
            export LIBCLANG_PATH="$(clang --print-resource-dir 2>/dev/null | sed 's|/lib/clang/.*||')/lib"
            echo "LIBCLANG_PATH fallback to system: $LIBCLANG_PATH"
          fi

          echo "LIBCLANG_PATH=$LIBCLANG_PATH"

          export PATH="/usr/lib/ccache:$PATH"

          if [[ "$ENABLE_RUST" == "true" ]]; then
            BINDGEN_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_PREBUILT_NAME/clang-tools/linux-x86/bin/bindgen"

            if [ -x "$BINDGEN_BIN" ]; then
              export BINDGEN="$BINDGEN_BIN"
              echo "bindgen exists: $BINDGEN_BIN"
            else
              echo "Prebuilt bindgen was not found. Installing bindgen 0.69.5 through cargo."
              echo "::group::Install bindgen via cargo"
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
              source "$HOME/.cargo/env"
              cargo install bindgen-cli --version 0.69.5
              echo "::endgroup::"

              BINDGEN_BIN=$(which bindgen)
              export BINDGEN="$BINDGEN_BIN"
              echo "BINDGEN_BIN from cargo: $BINDGEN_BIN"
            fi
          fi

          PAHOLE_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$KERNEL_BUILD_TOOLS_PREBUILT_NAME/kernel-build-tools/linux-x86/bin/pahole"

          if [ ! -x "$PAHOLE_BIN" ]; then
            PAHOLE_BIN="$(which pahole 2>/dev/null)"
            [ -x "$PAHOLE_BIN" ] && echo "pahole fallback from PATH: $PAHOLE_BIN"
          fi

          if [ -x "$PAHOLE_BIN" ]; then
            echo "pahole exists: $PAHOLE_BIN"
          else
            echo "pahole is missing. Aborting build."
            exit 13
          fi

          if [[ "$ENABLE_RUST" == "true" ]]; then
            RUSTC_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$RUST_TOOLS_PREBUILT_NAME/rust/linux-x86/$RUSTC_VERSION/bin/rustc"

            if [ ! -x "$RUSTC_BIN" ]; then
              RUSTC_BIN="$(which rustc 2>/dev/null)"
              [ -x "$RUSTC_BIN" ] && echo "rustc fallback from PATH: $RUSTC_BIN"
            fi

            if [ -x "$RUSTC_BIN" ]; then
              echo "rustc exists: $RUSTC_BIN"
              export RUSTC="$RUSTC_BIN"
            else
              echo "rustc is missing while ENABLE_RUST=true. Aborting build."
              exit 13
            fi
          fi

          # Match ReSuki behavior:
          # - 6.12 defaults to LTO none.
          # - 5.x keeps ThinLTO as before.
          # - Other kernels keep upstream/default unless adjusted later.
          REQUESTED_LTO="default"

          if [[ "$KERNEL_VERSION" == "6.12" ]]; then
            REQUESTED_LTO="none"
          elif [[ "$KERNEL_VERSION" == 5.* ]]; then
            REQUESTED_LTO="thin"
          fi

          echo "REQUESTED_LTO=$REQUESTED_LTO"

          LD_WRAPPER=""

          if [ "${{ github.event.inputs.BUILD_NOCACHE }}" = "false" ] && [[ "$REQUESTED_LTO" != "none" ]]; then
            LDCACHE_DIR="${GITHUB_WORKSPACE}/kernel_workspace/.thinlto-cache"
            mkdir -p "$LDCACHE_DIR"

            LLD_BIN="$(command -v ld.lld || true)"

            if [[ -z "$LLD_BIN" ]]; then
              echo "::warning title=ThinLTO cache disabled::ld.lld was not found. ld-wrapper cannot be created."
            else
              LD_WRAPPER="${GITHUB_WORKSPACE}/kernel_workspace/ld-wrapper"

              printf '#!/bin/bash\nexec "%s" "$@" --thinlto-cache-dir="%s" --thinlto-cache-policy=cache_size_bytes=3g --thinlto-jobs=%s\n' \
                "$LLD_BIN" "$LDCACHE_DIR" "$(nproc --all)" > "$LD_WRAPPER"

              chmod +x "$LD_WRAPPER"

              echo "ld-wrapper created: $LD_WRAPPER"
            fi
          else
            echo "ThinLTO ld-wrapper is disabled because REQUESTED_LTO=$REQUESTED_LTO or cache is disabled."
          fi

          REAL_CLANG_BIN="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/$CLANG_PREBUILT_BIN/clang"
          CC_WRAPPER="$GITHUB_WORKSPACE/kernel_workspace/cc-wrapper"

          printf '#!/bin/bash\nexec ccache "%s" "$@"\n' "$REAL_CLANG_BIN" > "$CC_WRAPPER"
          chmod +x "$CC_WRAPPER"

          echo "cc-wrapper created: $CC_WRAPPER"

          cd ./common

          : > .scmversion

          COMMON_REAL_PATH=$(pwd -P)
          PLATFORM_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          ROOT_REAL_PATH=$(dirname "$PLATFORM_REAL_PATH")

          MAP="-fdebug-prefix-map=$ROOT_REAL_PATH=."
          MPMAP="-fmacro-prefix-map=$ROOT_REAL_PATH=."
          FPMAP="-ffile-prefix-map=$ROOT_REAL_PATH=."

          KCFLAGS="$MAP $FPMAP -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector -D__ANDROID_COMMON_KERNEL__"
          KCPPFLAGS="$MPMAP"

          MAKE_ARGS=(
            LLVM=1
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CC="$CC_WRAPPER"
            HOSTCC="$CC_WRAPPER"
            HOSTLD=ld.lld
            PAHOLE="$PAHOLE_BIN"
            KCFLAGS="$KCFLAGS"
            KCPPFLAGS="$KCPPFLAGS"
            LLVM_PARALLEL_LINK_JOBS=2
          )

          if [[ -n "$LD_WRAPPER" ]]; then
            MAKE_ARGS+=(LD="$LD_WRAPPER")
          else
            MAKE_ARGS+=(LD=ld.lld)
          fi

          if [[ "$USE_LLVM_IAS" == "true" ]]; then
            MAKE_ARGS+=(LLVM_IAS=1)
          fi

          if [[ "$ENABLE_RUST" == "true" ]]; then
            MAKE_ARGS+=(RUSTC="$RUSTC_BIN")
            MAKE_ARGS+=(BINDGEN="$BINDGEN_BIN")
          fi

          make O=out "${MAKE_ARGS[@]}" gki_defconfig --no-print-directory

          # Apply LOCALVERSION through .config, matching the safer ReSuki style.
          if [[ -n "${CUSTOM_LOCALVERSION:-}" ]]; then
            echo "Applying CONFIG_LOCALVERSION=${CUSTOM_LOCALVERSION}"
            scripts/config --file out/.config --set-str LOCALVERSION "${CUSTOM_LOCALVERSION}"
            scripts/config --file out/.config -d LOCALVERSION_AUTO || true

            # Prevent SCM suffix from appending unexpected git hashes.
            sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion || true
          else
            echo "CUSTOM_LOCALVERSION is empty. Disabling LOCALVERSION_AUTO only."
            scripts/config --file out/.config -d LOCALVERSION_AUTO || true
            sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion || true
          fi

          case "$REQUESTED_LTO" in
            none)
              echo "Setting LTO to none for $KERNEL_VERSION, matching ReSuki 6.12 behavior..."
              scripts/config --file out/.config -e LTO_CLANG
              scripts/config --file out/.config -e LTO_CLANG_NONE
              scripts/config --file out/.config -d LTO_CLANG_THIN
              scripts/config --file out/.config -d LTO_CLANG_FULL
              ;;
            thin)
              echo "Setting LTO to thin..."
              scripts/config --file out/.config -e LTO_CLANG
              scripts/config --file out/.config -e LTO_CLANG_THIN
              scripts/config --file out/.config -d LTO_CLANG_NONE
              scripts/config --file out/.config -d LTO_CLANG_FULL
              ;;
            default)
              echo "Keeping upstream/default LTO selection for $KERNEL_VERSION."
              ;;
            *)
              echo "::error::Unknown REQUESTED_LTO value: $REQUESTED_LTO"
              exit 14
              ;;
          esac

          make O=out "${MAKE_ARGS[@]}" olddefconfig --no-print-directory

          echo "::group::Boot-critical configuration"
          grep -E '^CONFIG_(KSU|KSU_SUSFS|LTO|CFI|SHADOW_CALL_STACK|RUST|ANDROID_BINDER_IPC_RUST|LOCALVERSION|LOCALVERSION_AUTO|MODULES|MODVERSIONS|GKI|BBG|SECURITY|LSM)' out/.config || true
          echo "::endgroup::"

          echo "::group::LTO configuration"
          grep -E '^CONFIG_LTO|^CONFIG_THINLTO|^CONFIG_CFI|^CONFIG_SHADOW_CALL_STACK' out/.config || true
          echo "::endgroup::"

          make -j"$(nproc --all)" O=out "${MAKE_ARGS[@]}" Image

          ccache -s

      - name: Collect Build Config
        if: always()
        run: |
          set -euo pipefail

          echo "::group::Collect build .config"

          ARTIFACT_DIR="kernel_workspace/kernel_platform/out/artifacts/configs"
          mkdir -p "$ARTIFACT_DIR"

          echo "Searching for .config files under kernel_workspace/kernel_platform..."

          mapfile -t CONFIG_CANDIDATES < <(
            find kernel_workspace/kernel_platform \
              -type f \
              -name ".config" \
              2>/dev/null | sort
          )

          if [ "${#CONFIG_CANDIDATES[@]}" -eq 0 ]; then
            echo "::warning title=.config not found::No .config file was found under kernel_workspace/kernel_platform."

            echo "::group::Output directory diagnostics"
            find kernel_workspace/kernel_platform \
              -maxdepth 5 \
              \( -type d -name out -o -type d -name bazel-bin -o -type d -name dist \) \
              -print 2>/dev/null || true
            echo "::endgroup::"

            echo "::endgroup::"
            exit 0
          fi

          echo "Found .config candidates:"
          printf ' - %s\n' "${CONFIG_CANDIDATES[@]}"

          BEST_CONFIG=""

          for candidate in "${CONFIG_CANDIDATES[@]}"; do
            if grep -qE 'CONFIG_(KSU|RUST|LTO|LOCALVERSION)' "$candidate" 2>/dev/null; then
              BEST_CONFIG="$candidate"
              break
            fi
          done

          if [ -z "$BEST_CONFIG" ]; then
            BEST_CONFIG="${CONFIG_CANDIDATES[0]}"
          fi

          echo "Selected config: $BEST_CONFIG"

          cp "$BEST_CONFIG" "$ARTIFACT_DIR/${{ matrix.FILE }}.config"

          echo "::group::Selected config preview"
          grep -nEi 'KSU|KERNELSU|SUSFS|SUKISU|RUST|BINDER.*RUST|ANDROID_BINDER_IPC_RUST|LTO|LOCALVERSION|CFI|SHADOW_CALL_STACK' \
            "$ARTIFACT_DIR/${{ matrix.FILE }}.config" || true
          echo "::endgroup::"

          echo "CONFIG_ARTIFACT_PATH=$ARTIFACT_DIR/${{ matrix.FILE }}.config" >> "$GITHUB_ENV"

          echo "::endgroup::"    
          
      - name: Prepare AnyKernel3 Package
        id: ak3_prepare
        run: |
          set -euo pipefail

          echo "::group::Prepare AnyKernel3 package"

          rm -rf AnyKernel3

          git clone https://github.com/Bouteillepleine/AnyKernel3.git -b gki-2.0 --depth=1 AnyKernel3
          rm -rf ./AnyKernel3/.git

          mkdir -p kernel_workspace/kernel_platform/out/Final-Image-Find/
          mkdir -p kernel_workspace/kernel_platform/out/artifacts/

          image_path=""

          if [ -f "./kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image" ]; then
            image_path="./kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image"
            echo "Image file found at standard make Image path."
          fi

          if [ -z "$image_path" ] && [ -d "./kernel_workspace/kernel_platform/common/out/" ]; then
            image_path="$(find "./kernel_workspace/kernel_platform/common/out/" -name "Image" | head -n 1 || true)"
            if [ -n "$image_path" ]; then
              echo "Image file found in common/out."
            fi
          fi

          if [ -z "$image_path" ] && [ -d "./kernel_workspace/kernel_platform/out/" ]; then
            image_path="$(find "./kernel_workspace/kernel_platform/out/" -name "Image" | head -n 1 || true)"
            if [ -n "$image_path" ]; then
              echo "Image file found in kernel_platform/out."
            fi
          fi

          if [ -z "$image_path" ] || [ ! -f "$image_path" ]; then
            echo "::error::Image file was not found. Build failed."
            find "./kernel_workspace/kernel_platform" -type f -name Image -print 2>/dev/null | head -n 50 || true
            exit 1
          fi

          echo "Image file located at: $image_path"
          file "$image_path" || true
          ls -lh "$image_path"

          cp "$image_path" ./AnyKernel3/Image
          cp "$image_path" kernel_workspace/kernel_platform/out/Final-Image-Find/Image

          ZIP_MODEL="${ZIP_MODEL:-${FILE_BASE:-UnknownModel}}"
          OP_OS_VERSION="${OP_OS_VERSION:-Android${ANDROID_VERSION:-unknown}}"
          KERNEL_FULL_VER="${KERNEL_FULL_VER:-${CKERNEL_VERSION:-unknown}}"
          KSU_TYPE="${{ github.event.inputs.KSU_TYPE }}"
          KSU_VERSION="${KSUVER:-unknown}"
          SUSFS_VERSION="${SUSVER:-unknown}"

          if [ "${{ github.event.inputs.SUSFS_META }}" != "-1" ]; then
            ZIP_NAME="AK3_${ZIP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${KSU_TYPE}_${KSU_VERSION}_SusFS_${SUSFS_VERSION}.zip"
          else
            ZIP_NAME="AK3_${ZIP_MODEL}_${OP_OS_VERSION}_${KERNEL_FULL_VER}_${KSU_TYPE}_${KSU_VERSION}.zip"
          fi

          ZIP_NAME="$(echo "$ZIP_NAME" | tr ' ' '_' | tr -cd 'A-Za-z0-9._+-')"

          echo "ZIP_NAME=$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

          cd AnyKernel3

          sed -i 's/do.check_boot_version=.*/do.check_boot_version=1/' anykernel.sh || true

          # Safety cleanup: remove any accidental old kernel ZIPs from AK3 folder.
          rm -f AK3_*.zip ./*.zip.tmp 2>/dev/null || true

          echo "::group::AnyKernel3 package contents before optional modules"
          find . -maxdepth 2 -type f | sort | sed 's#^\./##'
          echo "::endgroup::"

          echo "✅ AnyKernel3 folder prepared. Final ZIP will be created after optional modules."
          echo "::endgroup::"

      - name: Download Latest SUSFS Module from CI
        if: ${{ github.event.inputs.SUSFS_META != '-1' }}
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "::group::Download latest SUSFS module from CI"

          MODULE_NAME="ksu_module_susfs_1.5.2+_CI.zip"
          MODULE_PATH="./AnyKernel3/${MODULE_NAME}"

          if [ ! -d "./AnyKernel3" ]; then
            echo "::warning::AnyKernel3 folder does not exist. Skipping module download."
            echo "::endgroup::"
            exit 0
          fi

          LATEST_RUN_ID="$(
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success&per_page=50" |
            jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' |
            head -n 1
          )"

          if [ -z "$LATEST_RUN_ID" ] || [ "$LATEST_RUN_ID" = "null" ]; then
            echo "::warning::No successful SUSFS module CI run was found for branch v1.5.2+."
            echo "::endgroup::"
            exit 0
          fi

          ARTIFACT_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/${LATEST_RUN_ID}/artifacts" |
            jq -r '.artifacts[] | select(.expired == false) | .archive_download_url' |
            head -n 1
          )"

          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "::warning::Failed to fetch SUSFS module artifact URL."
            echo "::endgroup::"
            exit 0
          fi

          if curl -fL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -o "$MODULE_PATH" \
            "$ARTIFACT_URL"; then

            FILE_SIZE="$(stat -c%s "$MODULE_PATH" 2>/dev/null || echo 0)"

            if [ "$FILE_SIZE" -lt 1000 ]; then
              echo "::warning::Downloaded SUSFS module ZIP is too small: ${FILE_SIZE} bytes. Removing it."
              rm -f "$MODULE_PATH"
              echo "::endgroup::"
              exit 0
            fi

            if unzip -l "$MODULE_PATH" | grep -q 'module.prop'; then
              echo "✅ Valid SUSFS module ZIP downloaded: $MODULE_NAME"
              ls -lh "$MODULE_PATH"
            else
              echo "::warning::Downloaded ZIP does not contain module.prop. Removing it."
              rm -f "$MODULE_PATH"
            fi
          else
            echo "::warning::Failed to download SUSFS module artifact."
          fi

          # Important: do not allow old kernel AK3 zips inside the package folder.
          find ./AnyKernel3 -maxdepth 1 -type f -name 'AK3_*.zip' -delete

          echo "::endgroup::"

      - name: Create AnyKernel3 ZIP
        id: ak3
        run: |
          set -euo pipefail

          echo "::group::Create AnyKernel3 ZIP"

          ARTIFACTS_DIR="kernel_workspace/kernel_platform/out/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          ZIP_NAME="${ZIP_NAME:-${{ steps.ak3_prepare.outputs.zip_name }}}"

          if [ -z "$ZIP_NAME" ]; then
            echo "::error::ZIP_NAME is empty."
            exit 1
          fi

          if [ ! -d "./AnyKernel3" ]; then
            echo "::error::AnyKernel3 folder does not exist."
            exit 1
          fi

          if [ ! -f "./AnyKernel3/Image" ]; then
            echo "::error::AnyKernel3/Image is missing."
            exit 1
          fi

          cd AnyKernel3

          # Safety: remove any accidental old final kernel ZIP from inside AK3.
          # Keep module ZIPs such as ksu_module_susfs_*.zip.
          find . -maxdepth 1 -type f -name 'AK3_*.zip' -delete

          echo "::group::Final AnyKernel3 contents"
          find . -maxdepth 2 -type f | sort | sed 's#^\./##'
          echo "::endgroup::"

          if ! zip -r9 "$ZIP_NAME" ./* \
            -x "*.git*" \
            -x "$ZIP_NAME" \
            -x "AK3_*.zip" \
            -x "README.md" \
            2>&1 | tee /tmp/ak3_zip.log; then
            echo "::error::Failed to create AnyKernel3 ZIP."
            exit 1
          fi

          cd ..

          mv "AnyKernel3/$ZIP_NAME" "$ARTIFACTS_DIR/$ZIP_NAME"

          # Keep root workspace clean too.
          rm -f "$ZIP_NAME" 2>/dev/null || true

          ZIP_SIZE="$(stat -c%s "$ARTIFACTS_DIR/$ZIP_NAME")"
          ZIP_SHA256="$(sha256sum "$ARTIFACTS_DIR/$ZIP_NAME" | awk '{print $1}')"

          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_OUTPUT"

          echo "✅ AnyKernel3 ZIP created"
          echo "Name:   $ZIP_NAME"
          echo "Path:   $ARTIFACTS_DIR/$ZIP_NAME"
          echo "Size:   $(numfmt --to=iec-i --suffix=B "$ZIP_SIZE")"
          echo "SHA256: $ZIP_SHA256"

          echo "::endgroup::"

      - name: Upload AnyKernel3 ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ZIP_NAME }}
          path: kernel_workspace/kernel_platform/out/artifacts/${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Check Cache Size Before Save
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' }}
        id: cache_size_check
        run: |
          check_size() {
            local CACHE_DIR="$1"
            local CACHE_NAME="$2"
            if [[ ! -d "$CACHE_DIR" ]]; then
              echo "${CACHE_NAME}_save=false" >> "$GITHUB_OUTPUT"
              return
            fi
            SIZE_MB=$(du -sm "$CACHE_DIR" | cut -f1)
            echo "$CACHE_DIR size: ${SIZE_MB} MB"
            if (( SIZE_MB >= 5 )); then
              echo "${CACHE_NAME}_save=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning title=Cache Warning::$CACHE_NAME is smaller than 5 MB. Skipping cache save."
              echo "${CACHE_NAME}_save=false" >> "$GITHUB_OUTPUT"
            fi
          }
          check_size "${{ env.CCACHE_DIR }}" "ccache"
          check_size "${{ github.workspace }}/kernel_workspace/.thinlto-cache" "thinlto"
          
      - name: Save Shared Ccache
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' && steps.cache_size_check.outputs.ccache_save == 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-${{ github.run_id }}

      - name: Save ThinLTO Cache
        if: ${{ github.event.inputs.BUILD_NOCACHE == 'false' && env.IS_612_KERNEL != 'true' && steps.cache_size_check.outputs.thinlto_save == 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/.thinlto-cache
          key: thinlto-${{ runner.os }}-${{ github.ref_name }}-oneplus-${{ matrix.FILE }}-${{ github.run_id }}

      - name: Post-build Disk Check
        run: df -h
